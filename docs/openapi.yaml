openapi: 3.0.3
info:
  title: Knowledge Base API
  description: |
    知识库管理系统API文档
    
    ## 认证方式
    
    ### 业务API认证
    使用API Key进行认证，在请求头中添加：
    ```
    Authorization: Bearer kb_live_xxxx
    ```
    
    ### 管理后台认证
    使用JWT Token进行认证，先通过登录接口获取token，然后在请求头中添加：
    ```
    Authorization: Bearer eyJhbGciOiJIUzI1NiIs...
    ```
    
    ## 权限说明
    - `read`: 读取权限
    - `write`: 写入权限
    - `admin`: 管理权限
    - `super_admin`: 超级管理员权限
    
  version: 1.0.0
  contact:
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: 本地开发环境
  - url: http://limousea.asia:3000/api/v1
    description: 生产环境

tags:
  - name: Health
    description: 健康检查接口
  - name: Knowledge
    description: 知识条目业务接口
  - name: Categories
    description: 分类查询业务接口
  - name: Admin Auth
    description: 管理员认证接口
  - name: Admin API Keys
    description: API Key管理接口
  - name: Admin Knowledge
    description: 知识条目管理接口
  - name: Admin Categories
    description: 分类管理接口
  - name: Admin Users
    description: 管理员用户管理接口
  - name: Admin Audit Logs
    description: 审计日志接口
  - name: Admin System
    description: 系统监控接口
  - name: Admin Stats
    description: 数据统计分析接口

paths:
  # ==================== 健康检查 ====================
  /health:
    get:
      tags:
        - Health
      summary: 存活探针（Liveness）
      description: |
        轻量级存活探针，**无需认证**。仅供容器编排（Dockerfile HEALTHCHECK、
        compose healthcheck、nginx）和负载均衡轮询使用。

        该端点不做任何数据库或依赖探测，也不泄露内部状态（无延迟、无版本、
        无后端类型），仅返回固定的 `{status: "ok"}` 表示进程存活并可接受请求。

        深度就绪检查（DB 连通性等）请使用受保护的管理端接口
        `/admin/system/health`。

        路径同时挂载在 `/health`（无前缀，供探针调用）和 `/api/v1/health`
        （Nest 管理路由），两者行为一致。
      security: []
      responses:
        '200':
          description: 进程存活
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

  # ==================== 知识条目业务API ====================
  /knowledge:
    get:
      tags:
        - Knowledge
      summary: 查询知识条目列表
      security:
        - ApiKeyAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: tags
          in: query
          description: 逗号分隔的标签列表
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - Knowledge
      summary: 创建知识条目
      description: 需要 write 权限
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntryRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEntryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /knowledge/stats:
    get:
      tags:
        - Knowledge
      summary: 获取知识库统计信息
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /knowledge/search:
    post:
      tags:
        - Knowledge
      summary: 搜索知识条目
      description: 基于语义和关键词的混合搜索
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                filters:
                  type: object
                  properties:
                    category:
                      type: string
                    language:
                      type: string
                    tags:
                      type: array
                      items:
                        type: string
                    difficulty_level:
                      type: array
                      items:
                        type: integer
                    created_after:
                      type: string
                      format: date-time
                    created_before:
                      type: string
                      format: date-time
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 20
                offset:
                  type: integer
                  minimum: 0
                  default: 0
                use_rerank:
                  type: boolean
                  default: false
                weights:
                  type: object
                  properties:
                    semantic:
                      type: number
                      minimum: 0
                      maximum: 1
                    keyword:
                      type: number
                      minimum: 0
                      maximum: 1
                    recency:
                      type: number
                      minimum: 0
                      maximum: 1
                    quality:
                      type: number
                      minimum: 0
                      maximum: 1
                    popularity:
                      type: number
                      minimum: 0
                      maximum: 1
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        title:
                          type: string
                        summary:
                          type: string
                        category:
                          type: string
                        tags:
                          type: array
                          items:
                            type: string
                        difficulty_level:
                          type: integer
                        score:
                          type: object
                          properties:
                            final:
                              type: number
                            semantic:
                              type: number
                            keyword:
                              type: number
                        created_at:
                          type: string
                          format: date-time
                  query_time_ms:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: 搜索服务暂时不可用

  /knowledge/{id}:
    get:
      tags:
        - Knowledge
      summary: 获取知识条目详情
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      tags:
        - Knowledge
      summary: 更新知识条目
      description: |
        需要 write 权限，且调用方必须是该条目的所有者（`created_by` 与
        当前 API Key 一致）。只有创建者可修改自己创建的条目。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntryRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Knowledge
      summary: 删除知识条目
      description: |
        需要 write 权限，且调用方必须是该条目的所有者（`created_by` 与
        当前 API Key 一致）。执行软删除。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /knowledge/{id}/versions:
    get:
      tags:
        - Knowledge
      summary: 获取知识条目版本历史
      description: 调用方必须是该条目的所有者。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeVersion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /knowledge/{id}/versions/{version}/restore:
    post:
      tags:
        - Knowledge
      summary: 恢复到指定版本
      description: 需要 write 权限，且调用方必须是该条目的所有者。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 恢复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 分类业务API ====================
  /categories:
    get:
      tags:
        - Categories
      summary: 获取分类列表
      description: 返回所有分类及其关联的知识条目数量
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /categories/{name}/stats:
    get:
      tags:
        - Categories
      summary: 获取分类统计信息
      description: 返回指定分类的统计信息，包括条目数量、按语言分布、平均质量分数等
      security:
        - ApiKeyAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: 分类名称
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 管理员认证 ====================
  /admin/auth/login:
    post:
      tags:
        - Admin Auth
      summary: 管理员登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '201':
          description: 登录成功（MFA启用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaRequiredResponse'
        '401':
          description: 凭证无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/auth/login/mfa:
    post:
      tags:
        - Admin Auth
      summary: MFA验证登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaLoginRequest'
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: MFA验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/auth/logout:
    post:
      tags:
        - Admin Auth
      summary: 管理员登出
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/refresh:
    post:
      tags:
        - Admin Auth
      summary: 刷新Token
      description: 使用refreshToken获取新的accessToken，无需Authorization头
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/profile:
    get:
      tags:
        - Admin Auth
      summary: 获取个人信息
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    put:
      tags:
        - Admin Auth
      summary: 更新个人信息
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/password:
    put:
      tags:
        - Admin Auth
      summary: 修改密码
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password changed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/mfa/setup:
    post:
      tags:
        - Admin Auth
      summary: 设置MFA
      description: 生成MFA密钥和二维码URL
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/mfa/enable:
    post:
      tags:
        - Admin Auth
      summary: 启用MFA
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: MFA验证码
      responses:
        '200':
          description: 启用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: MFA enabled successfully
        '400':
          description: 验证码无效
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid MFA code
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/mfa/disable:
    post:
      tags:
        - Admin Auth
      summary: 禁用MFA
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: MFA验证码
      responses:
        '200':
          description: 禁用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: MFA disabled successfully
        '400':
          description: MFA未启用
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: MFA is not enabled
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== API Key管理 ====================
  /admin/api-keys:
    get:
      tags:
        - Admin API Keys
      summary: 获取API Key列表
      description: 需要 super_admin 权限
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - Admin API Keys
      summary: 创建API Key
      description: 需要 super_admin 权限
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/api-keys/{id}:
    get:
      tags:
        - Admin API Keys
      summary: 获取API Key详情
      description: 需要 super_admin 权限
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      tags:
        - Admin API Keys
      summary: 更新API Key
      description: 需要 super_admin 权限
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApiKeyRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Admin API Keys
      summary: 删除API Key
      description: |
        需要 super_admin 权限。关联的 audit_logs / request_logs 行的
        api_key_id 将被置为 NULL（ON DELETE SET NULL），不会级联删除日志。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/api-keys/{id}/regenerate:
    post:
      tags:
        - Admin API Keys
      summary: 重新生成API Key
      description: 废弃旧Key并生成新Key。需要 super_admin 权限。返回完整的 ApiKey 对象，包含新生成的明文 key。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 重新生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 分类管理 ====================
  /admin/categories:
    get:
      tags:
        - Admin Categories
      summary: 获取分类列表
      description: 返回所有分类及其关联的知识条目数量，支持分页和搜索。需要 admin 或 super_admin 权限。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: 按分类名称模糊搜索
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - Admin Categories
      summary: 创建分类
      description: 需要 admin 或 super_admin 权限
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 分类名称已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/categories/{id}:
    get:
      tags:
        - Admin Categories
      summary: 获取分类详情
