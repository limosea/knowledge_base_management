        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  keyId:
                    type: string
                  totalRequests:
                    type: integer
                  byAction:
                    type: array
                    items:
                      type: object
                      properties:
                        action:
                          type: string
                        count:
                          type: integer
                  trend:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        count:
                          type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/stats/audit-analytics:
    get:
      summary: 审计日志分析
      description: 按 action 类型、状态、错误信息多维分析审计日志（仅 super_admin）。
      tags: [Admin Stats]
      security:
        - AdminAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  byAction:
                    type: array
                    items:
                      type: object
                      properties:
                        action:
                          type: string
                        count:
                          type: integer
                  byStatus:
                    type: array
                    items:
                      type: object
                      properties:
                        status:
                          type: string
                        count:
                          type: integer
                  topErrors:
                    type: array
                    items:
                      type: object
                      properties:
                        errorMessage:
                          type: string
                        action:
                          type: string
                        count:
                          type: integer
                  trend:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        count:
                          type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/stats/request-analytics:
    get:
      summary: 公开 API 请求分析
      description: |
        对公开端 API 请求进行 HTTP 级别的分析，包括状态码分布、请求成功率、
        请求量趋势（含错误计数）、延迟统计（avg/p50/p95）、热门端点排行。
        仅 super_admin 可访问。

        统计口径说明：仅包含公开 API（`/api/v1/...`）的请求；管理后台
        （`/admin/*`）与健康检查端点的流量不纳入统计。
      tags: [Admin Stats]
      security:
        - AdminAuth: []
      parameters:
        - name: period
          in: query
          description: 时间聚合粒度
          schema:
            type: string
            enum: [day, week, month]
            default: day
        - name: from
          in: query
          description: 起始时间（默认近 30 天）
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: 结束时间（默认当前）
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    enum: [day, week, month]
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  statusCodeDistribution:
                    type: array
                    description: 按 HTTP 状态码统计请求数
                    items:
                      type: object
                      properties:
                        code:
                          type: integer
                          description: HTTP 状态码
                        count:
                          type: integer
                  successRate:
                    type: object
                    description: 请求成功率汇总
                    properties:
                      total:
                        type: integer
                        description: 总请求数
                      success2xx:
                        type: integer
                        description: 2xx 响应数
                      clientError4xx:
                        type: integer
                        description: 4xx 响应数
                      serverError5xx:
                        type: integer
                        description: 5xx 响应数
                  requestVolumeTrend:
                    type: array
                    description: 请求量时间趋势
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          description: 日期（YYYY-MM-DD）
                        total:
                          type: integer
                          description: 该时段总请求数
                        errors:
                          type: integer
                          description: 该时段错误请求数（4xx + 5xx）
                  latencyStats:
                    type: object
                    description: 响应延迟统计（单位：毫秒）
                    properties:
                      avgMs:
                        type: integer
                        description: 平均响应时间
                      p50Ms:
                        type: integer
                        description: P50 响应时间
                      p95Ms:
                        type: integer
                        description: P95 响应时间
                  topEndpoints:
                    type: array
                    description: 热门端点 Top 20
                    items:
                      type: object
                      properties:
                        method:
                          type: string
                          description: HTTP 方法
                        path:
                          type: string
                          description: 请求路径
                        count:
                          type: integer
                          description: 请求数
                        avgResponseTime:
                          type: integer
                          description: 平均响应时间（毫秒）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API Key认证，格式为 kb_live_xxxx
    
    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 管理员JWT Token认证

  parameters:
    EntryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 知识条目ID
    
    ApiKeyId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: API Key ID

    AdminUserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 管理员用户ID

    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 分类ID

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ========== 通用响应 ==========
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - timestamp
          properties:
            code:
              type: string
              description: 机器可读的错误码，例如 BAD_REQUEST、UNAUTHORIZED、CATEGORY_NOT_FOUND
            message:
              type: string
              description: 人类可读的错误描述
            request_id:
              type: string
              description: 用于在日志中追踪该请求的唯一 ID（由请求头 X-Request-Id 或服务器生成）
            timestamp:
              type: string
              format: date-time
              description: 错误发生时间（ISO 8601）
    
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    # ========== 分类相关 ==========
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    CategoryWithEntryCount:
      type: object
      properties:
        name:
          type: string
        entry_count:
          type: integer
          description: 该分类下的知识条目数量
    
    CategoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CategoryWithEntryCount'
        total:
          type: integer
          description: 分类总数
    
    AdminCategoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            allOf:
              - $ref: '#/components/schemas/Category'
              - type: object
                properties:
                  entry_count:
                    type: integer
                    description: 该分类下的知识条目数量
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    
    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    
    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    
    CategoryStats:
      type: object
      properties:
        name:
          type: string
        total_entries:
          type: integer
          description: 该分类下的知识条目总数
        by_language:
          type: object
          additionalProperties:
            type: integer
          description: 按编程语言统计的条目数量
        avg_quality_score:
          type: number
          format: float
          description: 平均质量分数
    
    AdminCategoryStats:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        total_entries:
          type: integer
          description: 该分类下的知识条目总数
        by_language:
          type: object
          additionalProperties:
            type: integer
          description: 按编程语言统计的条目数量
        by_difficulty:
          type: object
          additionalProperties:
            type: integer
          description: 按难度等级(1-5)统计的条目数量
        by_framework:
          type: object
          additionalProperties:
            type: integer
          description: 按框架统计的条目数量
        avg_quality_score:
          type: number
          format: float
          description: 平均质量分数
        recent_entries:
          type: integer
          description: 最近7天新增的条目数量

    # ========== 认证相关 ==========
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: 过期时间（秒）
        requirePasswordChange:
          type: boolean
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            role:
              type: string
              enum: [admin, super_admin]
            email:
              type: string
    
    MfaRequiredResponse:
      type: object
      properties:
        mfaRequired:
          type: boolean
          example: true
        tempToken:
          type: string
    
    MfaLoginRequest:
      type: object
      required:
        - tempToken
        - mfaCode
      properties:
        tempToken:
          type: string
        mfaCode:
          type: string
          minLength: 6
          maxLength: 8
    
    AdminProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, super_admin]
        mfaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
    
    UpdateProfileRequest:
      type: object
      properties:
        email:
          type: string
          format: email
    
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          description: 必须包含大小写字母、数字和特殊字符
    
    MfaSetupResponse:
      type: object
      properties:
        secret:
          type: string
        qrCodeUrl:
          type: string
        backupCodes:
          type: array
          items:
            type: string

    # ========== API Key相关 ==========
    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        permissions:
          type: array
          items:
            type: string
            enum: [read, write, admin]
          default: [read]
        rateLimit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        expiresAt:
          type: string
          format: date-time
    
    UpdateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        permissions:
          type: array
          items:
            type: string
            enum: [read, write, admin]
        rateLimit:
          type: integer
          minimum: 1
          maximum: 1000
        expiresAt:
          type: string
          format: date-time
        isActive:
          type: boolean
    
    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: 完整API Key（仅在创建或重新生成时返回）
        keyPrefix:
          type: string
          description: Key前缀，用于识别
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        rateLimit:
          type: integer
        isActive:
          type: boolean
        lastUsedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    
    ApiKeyListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ApiKey'

    # ========== 知识条目相关 ==========
    CreateEntryRequest:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 50000
        summary:
          type: string
          maxLength: 1000
        category:
          type: string
          maxLength: 100
          description: 分类名称，必须是已存在的分类
        tags:
          type: array
          items:
            type: string
        language:
          type: string
          maxLength: 50
        framework:
          type: string
          maxLength: 100
        difficulty_level:
          type: integer
          minimum: 1
          maximum: 5
        structured_data:
          type: object

    UpdateEntryRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 50000
        summary:
          type: string
          maxLength: 1000
        category:
          type: string
          maxLength: 100
        tags:
          type: array
          items:
            type: string
        language:
          type: string
          maxLength: 50
        framework:
          type: string
          maxLength: 100
        difficulty_level:
          type: integer
          minimum: 1
          maximum: 5
        structured_data:
          type: object
        change_summary:
          type: string
          description: 本次修改的摘要说明
    
    CreateEntryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entry_version:
          type: integer
        embedding_status:
          type: string
          enum: [processing, completed, failed]
        created_at:
          type: string
          format: date-time
    
    KnowledgeEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        language:
          type: string
        framework:
          type: string
        difficultyLevel:
          type: integer
        qualityScore:
          type: number
        structuredData:
          type: object
        createdBy:
          type: string
          format: uuid
          description: 创建该条目的 API Key ID（UUID 格式，非用户名）
        entryVersion:
          type: integer
        isLatest:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    KnowledgeListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/KnowledgeEntry'
    
    KnowledgeVersion:
      type: object
      properties:
        version:
          type: integer
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        language:
          type: string
        framework:
          type: string
        difficultyLevel:
          type: integer
        changeSummary:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
          description: 提交此版本的 API Key ID（UUID 格式）
    
    KnowledgeStats:
      type: object
      properties:
        total:
          type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
        avgQualityScore:
          type: number
    
    AdminKnowledgeListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  title:
                    type: string
                  category:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string
                  qualityScore:
                    type: number
                  createdAt:
                    type: string
                    format: date-time
                  createdBy:
                    type: string
                    format: uuid
                    description: 创建该条目的 API Key ID（UUID 格式，非用户名）
    
    AdminKnowledgeStats:
      type: object
      properties:
        total:
          type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
        avgQualityScore:
          type: number

    # ========== 管理员用户相关 ==========
    AdminUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, super_admin]
        isActive:
          type: boolean
        mfaEnabled:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    AdminUserListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AdminUserSummary'

    CreateAdminUserRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          description: 必须包含大小写字母、数字和特殊字符
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, super_admin]
          default: admin

    UpdateAdminUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, super_admin]
        isActive:
          type: boolean

    # ========== 审计日志相关 ==========
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        details:
          type: object
        ipAddress:
          type: string
        userAgent:
          type: string
        apiKeyId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    
    AuditLogListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AuditLog'

    # ========== 系统统计相关 ==========
    SystemStats:
      type: object
      properties:
        knowledgeEntries:
          type: object
          properties:
            total:
              type: integer
            byCategory:
              type: object
              additionalProperties:
                type: integer
            avgQualityScore:
              type: number
        apiKeys:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            expired:
              type: integer
        requests:
          type: object
          properties:
            today:
              type: integer
            thisWeek:
              type: integer
            thisMonth:
              type: integer
