openapi: 3.0.3
info:
  title: Knowledge Base API
  description: |
    知识库管理系统API文档
    
    ## 认证方式
    
    ### 业务API认证
    使用API Key进行认证，在请求头中添加：
    ```
    Authorization: Bearer kb_live_xxxx
    ```
    
    ### 管理后台认证
    使用JWT Token进行认证，先通过登录接口获取token，然后在请求头中添加：
    ```
    Authorization: Bearer eyJhbGciOiJIUzI1NiIs...
    ```
    
    ## 权限说明

    系统采用 RAM (Role-Based Access Management) 权限模型，包含角色管理和细粒度权限控制。

    ### API Key 权限（作用于业务 API，即 `/knowledge`、`/categories`、`/search` 等）
    - `read`  : 读取权限
    - `write` : 写入权限

    ### 管理后台角色（作用于 `/admin/*` 接口）
    - `super_admin`: 超级管理员，拥有完整管理权限，隐式拥有所有权限，可管理角色
    - `admin`      : 管理员，通过 `role_permissions` 表配置权限
    - `user`       : 普通用户，自助服务权限

    ### 细粒度管理权限（存储于 `role_permissions` 表）
    - `users:read`          : 查看用户列表
    - `users:write`         : 创建/编辑用户
    - `knowledge:read`      : 查看自己的知识条目
    - `knowledge:read_all`  : 查看所有知识条目
    - `knowledge:delete`    : 删除知识条目
    - `apikeys:read`        : 查看 API Key
    - `apikeys:write`       : 管理 API Key
    - `audit:read`          : 查看审计日志
    - `analytics:read`      : 查看分析数据
    - `system:read`         : 查看系统信息
    - `stats:read`          : 查看统计信息
    - `libraries:read`      : 查看库
    - `libraries:write`     : 管理库
    - `roles:manage`        : 角色管理（仅 super_admin，通过标志位控制，非权限字符串）
    
  version: 1.0.0
  contact:
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: 本地开发环境
  - url: http://limousea.asia:3000/api/v1
    description: 生产环境

tags:
  - name: Health
    description: 健康检查接口
  - name: Knowledge
    description: 知识条目业务接口
  - name: Categories
    description: 分类查询业务接口
  - name: MCP
    description: Model Context Protocol 接口，供 AI Agent（如 Claude Desktop、Cursor 等）通过 MCP 协议查询知识库
  - name: Admin Auth
    description: 管理员认证接口
  - name: Admin API Keys
    description: API Key管理接口
  - name: Admin Knowledge
    description: 知识条目管理接口
  - name: Admin Categories
    description: 分类管理接口
  - name: Admin Users
    description: 管理员用户管理接口
  - name: Admin Roles
    description: |
      角色管理接口（仅 super_admin 可访问）。
      
      系统预置三个系统角色：
      - `super_admin`: 超级管理员，隐式拥有所有权限
      - `admin`: 管理员，通过 role_permissions 配置权限
      - `user`: 普通用户，自助服务权限
      
      系统角色不可删除，但可修改描述和权限。自定义角色可完全管理。
  - name: Admin Audit Logs
    description: |
      审计日志接口，遵循 4W1H1R 原则：
      Who（操作者及角色）、When（操作时间）、Where（IP 地址）、
      What（操作动作 + 资源）、How（来源渠道 + 客户端信息）、Result（操作结果）
  - name: Admin System
    description: 系统监控接口
  - name: Admin Stats
    description: 数据统计分析接口
  - name: Admin Self-Service
    description: 管理员自助服务接口，供普通用户管理自己的 API Key 和查看个人统计

paths:
  # ==================== 健康检查 ====================
  /health:
    get:
      tags:
        - Health
      summary: 存活探针（Liveness）
      description: |
        轻量级存活探针，**无需认证**。仅供容器编排（Dockerfile HEALTHCHECK、
        compose healthcheck、nginx）和负载均衡轮询使用。

        该端点不做任何数据库或依赖探测，也不泄露内部状态（无延迟、无版本、
        无后端类型），仅返回固定的 `{status: "ok"}` 表示进程存活并可接受请求。

        深度就绪检查（DB 连通性等）请使用受保护的管理端接口
        `/admin/system/health`。

        路径同时挂载在 `/health`（无前缀，供探针调用）和 `/api/v1/health`
        （Nest 管理路由），两者行为一致。
      security: []
      responses:
        '200':
          description: 进程存活
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

  # ==================== 知识条目业务API ====================
  /knowledge:
    get:
      tags:
        - Knowledge
      summary: 查询知识条目列表
      description: |
        需要 `read` API Key 权限。仅返回当前 API Key 可见的条目：`visibility='public'` 的条目，加上 `created_by` 等于当前 API Key ID 的私有条目。
      security:
        - ApiKeyAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: tags
          in: query
          description: 逗号分隔的标签列表
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - Knowledge
      summary: 创建知识条目
      description: |
        需要 `write` API Key 权限。新条目默认 `visibility='private'`（仅当前 API Key 可见）；可在请求体中显式传 `visibility: 'public'` 以允许其他 API Key 读取。`created_by` 自动绑定为当前 API Key ID。
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntryRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEntryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /knowledge/stats:
    get:
      tags:
        - Knowledge
      summary: 获取知识库统计信息
      description: |
        需要 `read` API Key 权限。统计结果仅包含当前 API Key 可见的条目（`visibility='public'` 加上当前 Key 创建的私有条目）。
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /knowledge/search:
    post:
      tags:
        - Knowledge
      summary: 搜索知识条目
      description: |
        需要 `read` API Key 权限。基于语义和关键词的混合搜索。可见性过滤在向量召回阶段即生效：私有条目不会通过相似性搜索泄露给非 owner。
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                filters:
                  type: object
                  properties:
                    category:
                      type: string
                    language:
                      type: string
                    tags:
                      type: array
                      items:
                        type: string
                    difficulty_level:
                      type: array
                      items:
                        type: integer
                    created_after:
                      type: string
                      format: date-time
                    created_before:
                      type: string
                      format: date-time
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 20
                offset:
                  type: integer
                  minimum: 0
                  default: 0
                use_rerank:
                  type: boolean
                  default: false
                weights:
                  type: object
                  properties:
                    semantic:
                      type: number
                      minimum: 0
                      maximum: 1
                    keyword:
                      type: number
                      minimum: 0
                      maximum: 1
                    recency:
                      type: number
                      minimum: 0
                      maximum: 1
                    quality:
                      type: number
                      minimum: 0
                      maximum: 1
                    popularity:
                      type: number
                      minimum: 0
                      maximum: 1
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        title:
                          type: string
                        summary:
                          type: string
                        category:
                          type: string
                        tags:
                          type: array
                          items:
                            type: string
                        difficulty_level:
                          type: integer
                        score:
                          type: object
                          properties:
                            final:
                              type: number
                            semantic:
                              type: number
                            keyword:
                              type: number
                        created_at:
                          type: string
                          format: date-time
                  query_time_ms:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: 搜索服务暂时不可用

  /knowledge/{id}:
    get:
      tags:
        - Knowledge
      summary: 获取知识条目详情
      description: |
        需要 `read` API Key 权限。私有条目仅 owner 可读；非 owner 访问私有条目或不存在条目一律返回 404（不暴露存在性）。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      tags:
        - Knowledge
      summary: 更新知识条目
      description: |
        需要 write 权限，且调用方必须是该条目的所有者（`created_by` 与
        当前 API Key 一致）。只有创建者可修改自己创建的条目。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntryRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Knowledge
      summary: 删除知识条目
      description: |
        需要 write 权限，且调用方必须是该条目的所有者（`created_by` 与
        当前 API Key 一致）。执行软删除。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /knowledge/{id}/versions:
    get:
      tags:
        - Knowledge
      summary: 获取知识条目版本历史
      description: 调用方必须是该条目的所有者。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeVersion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /knowledge/{id}/versions/{version}/restore:
    post:
      tags:
        - Knowledge
      summary: 恢复到指定版本
      description: 需要 write 权限，且调用方必须是该条目的所有者。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 恢复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 分类业务API ====================
  /categories:
    get:
      tags:
        - Categories
      summary: 获取分类列表
      description: 返回所有分类及其关联的知识条目数量
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /categories/{name}/stats:
    get:
      tags:
        - Categories
      summary: 获取分类统计信息
      description: 返回指定分类的统计信息，包括条目数量、按语言分布、平均质量分数等
      security:
        - ApiKeyAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: 分类名称
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== MCP (Model Context Protocol) ====================
  /mcp:
    post:
      tags:
        - MCP
      summary: MCP 协议端点
      description: |
        Model Context Protocol (MCP) 端点，供 AI Agent（如 Claude Desktop、Cursor 等）
        通过 MCP 协议查询知识库。使用 Streamable HTTP 传输，无状态模式。

        支持以下 MCP 工具（Tools）：
        - `search_knowledge`: 语义+关键词混合搜索知识条目（受 visibility 过滤，私有条目不向非 owner 暴露）
        - `get_knowledge_entry`: 按 UUID 获取知识条目详情（受 visibility 过滤；需绑定 API Key）
        - `list_categories`: 列出所有分类及可见条目数（按 visibility 聚合）
        - `get_category_stats`: 获取分类统计信息（按 visibility 聚合）
        - `get_knowledge_stats`: 获取知识库整体统计（按 visibility 聚合；需绑定 API Key）

        通信流程遵循 MCP 规范：客户端首先发送 `initialize` 握手，然后通过 `tools/list`
        和 `tools/call` 方法调用上述工具。请求体为 JSON-RPC 2.0 格式，响应同样为 JSON-RPC 2.0。

        **审计日志（4W1H1R）：** 所有 MCP 工具调用均自动记录审计日志，包括操作者（API Key / owner）、
        来源 IP、User-Agent、调用工具名、输入参数摘要、耗时及结果。客户端可通过
        `X-MCP-Client` 请求头标识自身（如 `cursor/0.45.1`），未提供时系统将从
        User-Agent 自动解析已知客户端（Cursor、Claude Desktop、Windsurf 等）。
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: JSON-RPC 2.0 请求（MCP 协议消息）
              properties:
                jsonrpc:
                  type: string
                  enum: ['2.0']
                method:
                  type: string
                  description: 'MCP 方法名，如 initialize、tools/list、tools/call'
                params:
                  type: object
                  description: 方法参数（具体取决于 MCP 方法）
                id:
                  description: JSON-RPC 请求 ID
      responses:
        '200':
          description: JSON-RPC 2.0 响应
          content:
            application/json:
              schema:
                type: object
                description: JSON-RPC 2.0 响应
                properties:
                  jsonrpc:
                    type: string
                    enum: ['2.0']
                  result:
                    type: object
                    description: 成功时的结果
                  error:
                    type: object
                    description: 失败时的错误信息
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  id:
                    description: 对应请求的 JSON-RPC ID
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== 管理员认证 ====================
  /admin/auth/login:
    post:
      tags:
        - Admin Auth
      summary: 管理员登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '201':
          description: 登录成功（MFA启用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaRequiredResponse'
        '401':
          description: 凭证无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/auth/login/mfa:
    post:
      tags:
        - Admin Auth
      summary: MFA验证登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaLoginRequest'
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: MFA验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/auth/logout:
    post:
      tags:
        - Admin Auth
      summary: 管理员登出
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/refresh:
    post:
      tags:
        - Admin Auth
      summary: 刷新Token
      description: 使用refreshToken获取新的accessToken，无需Authorization头
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/profile:
    get:
      tags:
        - Admin Auth
      summary: 获取个人信息
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    put:
      tags:
        - Admin Auth
      summary: 更新个人信息
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/password:
    put:
      tags:
        - Admin Auth
      summary: 修改密码
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password changed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/mfa/setup:
    post:
      tags:
        - Admin Auth
      summary: 设置MFA
      description: 生成MFA密钥和二维码URL
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/mfa/enable:
    post:
      tags:
        - Admin Auth
      summary: 启用MFA
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: MFA验证码
      responses:
        '200':
          description: 启用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: MFA enabled successfully
        '400':
          description: 验证码无效
          content:
            application/json:
