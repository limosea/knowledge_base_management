      summary: 更新角色
      description: |
        仅 super_admin 可访问，且需 step-up 提权（高级控制台）。系统角色的名称不可修改，但可修改描述和权限。自定义角色可修改所有字段。
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 角色名称已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Admin Roles
      summary: 删除角色
      description: |
        仅 super_admin 可访问，且需 step-up 提权（高级控制台）。只能删除自定义角色，系统角色不可删除。如果有用户仍分配了该角色，则无法删除。
      security:
        - AdminAuth: []
