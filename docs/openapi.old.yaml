openapi: 3.0.3
info:
  title: Knowledge Base API
  description: |
    知识库管理系统API文档
    
    ## 认证方式
    
    ### 业务API认证
    使用API Key进行认证，在请求头中添加：
    ```
    Authorization: Bearer kb_live_xxxx
    ```
    
    ### 管理后台认证
    使用JWT Token进行认证，先通过登录接口获取token，然后在请求头中添加：
    ```
    Authorization: Bearer eyJhbGciOiJIUzI1NiIs...
    ```
    
    ## 权限说明

    系统采用 RAM (Role-Based Access Management) 权限模型，包含角色管理和细粒度权限控制。

    ### API Key 权限（作用于业务 API，即 `/knowledge`、`/categories`、`/search` 等）
    - `read`  : 读取权限
    - `write` : 写入权限

    ### 管理后台角色（作用于 `/admin/*` 接口）
    - `super_admin`: 超级管理员，拥有完整管理权限，隐式拥有所有权限，可管理角色
    - `admin`      : 管理员，通过 `role_permissions` 表配置权限
    - `user`       : 普通用户，自助服务权限

    ### 基线权限（账号固有，不存入 `role_permissions`）
    任何激活的账号均默认拥有以下能力，无需任何权限项：
    - 登录管理端，使用业务 API（API 端与管理端同权）
    - 对自己名下的库与条目执行任意 CRUD 并修改其可见性状态（`public` / `private` / `inherit`）
    - 只读公开且未被屏蔽（`shielded=false`）的库与条目
    - 通过 `/admin/me/*` 自助接口管理自己的 API Key
    - 查看个人统计

    ### 细粒度管理权限（存储于 `role_permissions` 表）
    - `users:list`             : 列出全站管理员用户
    - `users:manage`           : 创建/编辑/停用/重置密码管理员用户（仅 super_admin）
    - `content:view_shielded`  : 在列表/详情中可见已被屏蔽的库或条目
    - `content:shield`         : 将他人已公开的库/条目标记为屏蔽（从公开视图隐藏，原始数据不动）
    - `content:unshield`       : 解除屏蔽，恢复公开
    - `apikeys:list`           : 列出全站 API Key
    - `apikeys:manage`         : 管理全站任意 API Key（仅 super_admin）
    - `audit:read`             : 查看审计日志
    - `analytics:read`         : 查看分析数据
    - `system:read`            : 查看系统信息
    - `stats:read`             : 查看统计信息

    ### 标志位控制的权限（不存入 `role_permissions`）
    - `roles:manage`           : 角色管理（仅 super_admin，通过 `is_super_admin` 标志位控制）
    - 系统管理（修改系统配置） : 仅 super_admin，通过 `is_super_admin` 标志位控制，永不下发为权限字符串

    ### 屏蔽 vs 删除
    管理员**无权**篡改或抹除他人数据（创建者主权）。对公开内容的审核下架通过
    `content:shield` 翻转 `shielded` 布尔位实现：屏蔽后公开列表不可见，但 owner 与
    持有 `content:view_shielded` 的管理员仍可见，原始数据纹丝不动。
    创建者仍可通过业务 API 对自己的条目做软删除/恢复。

    ### 个人控制台 vs 高级控制台（Step-up Elevation）
    前端将管理端 UI 拆分为两个区域：
    - **个人控制台**：仅涉及调用者自身资源（自己的 API Key、个人统计、自己的条目等）。
      只需登录即可访问，无需额外验证。
    - **高级控制台**：影响全站或其他用户的高危操作（用户管理、任意 API Key 签发、
      内容屏蔽、角色管理等）。进入前必须通过 step-up 验证。

    进入高级控制台的流程：
    1. 前端调用 `GET /admin/elevation/status`，若 `elevated=false` 则隐藏高级入口。
    2. 若 `mfaEnabled=false`，引导用户完成 `POST /admin/auth/mfa/setup` + `enable`。
    3. 用户点击"进入高级控制台"→前端弹出 TOTP 输入框→
       `POST /admin/elevation/step-up { code: '123456' }`。
    4. 成功后 `session.elevated_until = NOW() + 15 分钟`，前端显示高级入口。
    5. 用户可随时调用 `POST /admin/elevation/revoke` 退出。

    受保护的高级路由在未提权时返回 `403 ELEVATION_REQUIRED`：
    - `POST/PUT/DELETE /admin/users/*`
    - `POST/PUT/DELETE /admin/api-keys/*`
    - `POST /admin/knowledge/{id}/shield|unshield`、`batch-shield`、`batch-unshield`
    - 全部 `/admin/roles/*`（本身已是 super_admin 专属，额外要求提权）

    列表类端点（`GET /admin/users`、`GET /admin/api-keys`）采用 **elevation-aware
    scope**：未提权时仅返回调用者名下资源（创建者主权），提权后返回全站资源。

    ### 强制改密策略（服务端强制执行）
    新建管理员、管理员密码被上级重置、或凭证轮换后，账号会被置为
    `requirePasswordChange = true`。此时登录响应会携带
    `requirePasswordChange: true`，**且服务端会在所有受保护端点上强制执行**：

    - 除下文列出的"改密流程白名单"外，所有需要 `AdminAuth` 的端点一律返回
      `403 PASSWORD_CHANGE_REQUIRED`，前端必须把用户引导到改密页面，
      仅靠修改前端路由无法绕过。
    - 改密成功后服务端会将 `requirePasswordChange` 置 `false` 并**清除该用户的
      全部会话**（`AdminAuthService.changePassword`），前端必须使用新凭证重新登录。

    改密流程白名单（即便 `requirePasswordChange = true` 仍可访问）：
    - `POST /admin/auth/logout`
    - `GET  /admin/auth/profile`
    - `PUT  /admin/auth/password`
    - `POST /admin/auth/mfa/setup`
    - `POST /admin/auth/mfa/enable`

    未登录接口（`POST /admin/auth/login`、`POST /admin/auth/login/mfa`、
    `POST /admin/auth/refresh`）与上述白名单之外的所有 `/admin/*` 端点
    均会被 `403 PASSWORD_CHANGE_REQUIRED` 拦截。

    `403 PASSWORD_CHANGE_REQUIRED` 响应使用统一错误信封：
    ```json
    {
      "error": {
        "code": "PASSWORD_CHANGE_REQUIRED",
        "message": "Password change required before accessing this resource",
        "request_id": "…",
        "timestamp": "2026-06-24T10:00:00.000Z"
      }
    }
    ```

  version: 1.0.0
  contact:
    email: support@example.com
  license:
