  /admin/stats/request-analytics:
    get:
      summary: 公开 API 请求分析
      description: |
        对公开端 API 请求进行 HTTP 级别的分析，包括状态码分布、请求成功率、
        请求量趋势（含错误计数）、延迟统计（avg/p50/p95）、热门端点排行。
        admin 与 super_admin 可访问。

        统计口径说明：仅包含公开 API（`/api/v1/...`）的请求；管理后台
        （`/admin/*`）与健康检查端点的流量不纳入统计。
      tags: [Admin Stats]
      security:
        - AdminAuth: []
      parameters:
        - name: period
          in: query
          description: 时间聚合粒度
          schema:
            type: string
            enum: [day, week, month]
            default: day
        - name: from
          in: query
          description: 起始时间（默认近 30 天）
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: 结束时间（默认当前）
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    enum: [day, week, month]
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  statusCodeDistribution:
                    type: array
                    description: 按 HTTP 状态码统计请求数
                    items:
                      type: object
                      properties:
                        code:
                          type: integer
                          description: HTTP 状态码
                        count:
                          type: integer
                  successRate:
                    type: object
                    description: 请求成功率汇总
                    properties:
                      total:
                        type: integer
                        description: 总请求数
                      success2xx:
                        type: integer
                        description: 2xx 响应数
                      clientError4xx:
                        type: integer
                        description: 4xx 响应数
                      serverError5xx:
                        type: integer
                        description: 5xx 响应数
                  requestVolumeTrend:
                    type: array
                    description: 请求量时间趋势
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          description: 日期（YYYY-MM-DD）
                        total:
                          type: integer
                          description: 该时段总请求数
                        errors:
                          type: integer
                          description: 该时段错误请求数（4xx + 5xx）
                  latencyStats:
                    type: object
                    description: 响应延迟统计（单位：毫秒）
                    properties:
                      avgMs:
                        type: integer
                        description: 平均响应时间
                      p50Ms:
                        type: integer
                        description: P50 响应时间
                      p95Ms:
                        type: integer
                        description: P95 响应时间
                  topEndpoints:
                    type: array
                    description: 热门端点 Top 20
                    items:
                      type: object
                      properties:
                        method:
                          type: string
                          description: HTTP 方法
                        path:
                          type: string
                          description: 请求路径
                        count:
                          type: integer
                          description: 请求数
                        avgResponseTime:
                          type: integer
                          description: 平均响应时间（毫秒）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==================== 系统消息管理 ====================
  /admin/messages:
    get:
      tags:
        - Admin Messages
      summary: 获取消息列表
      description: |
        需要认证。返回当前用户的消息列表，支持分页和按类型、已读状态、收藏状态过滤。
        默认按创建时间倒序排列。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: type
          in: query
          description: 按消息类型过滤
          schema:
            type: string
            enum: [announcement, approval, system]
        - name: unreadOnly
          in: query
          description: 仅返回未读消息
          schema:
            type: boolean
            default: false
        - name: starredOnly
          in: query
          description: 仅返回收藏的消息
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/messages/send:
    post:
      tags:
        - Admin Messages
      summary: 发送系统消息
      description: |
        需要 `messages:send` 权限。向指定目标发送系统消息。
        支持四种目标类型：all（全体用户，仅 super_admin）、users（指定用户）、role（指定角色）、permission（指定权限）。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: 发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/messages/unread-count:
    get:
      tags:
        - Admin Messages
      summary: 获取未读消息数量
      description: 需要认证。返回当前用户的未读消息总数。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/messages/batch-read:
    patch:
      tags:
        - Admin Messages
      summary: 批量标记已读
      description: 需要认证。将指定消息列表标记为已读。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchMessageOperation'
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/messages/read-all:
    patch:
      tags:
        - Admin Messages
      summary: 标记所有消息为已读
      description: 需要认证。将当前用户的所有未读消息标记为已读。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/messages/{id}:
    get:
      tags:
        - Admin Messages
      summary: 获取消息详情
      description: 需要认证。获取指定消息的详细信息。
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 消息ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Admin Messages
      summary: 删除消息
      description: 需要认证。删除指定消息（软删除）。
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 消息ID
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/messages/{id}/read:
    patch:
      tags:
        - Admin Messages
      summary: 标记单条消息已读
      description: 需要认证。将指定消息标记为已读。
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 消息ID
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/messages/{id}/star:
    patch:
      tags:
        - Admin Messages
      summary: 设置/取消收藏消息
      description: 需要认证。设置或取消指定消息的收藏状态。
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 消息ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - starred
              properties:
                starred:
                  type: boolean
                  description: true=收藏，false=取消收藏
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  starred:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/messages/batch:
    delete:
      tags:
        - Admin Messages
      summary: 批量删除消息
      description: 需要认证。批量删除指定消息列表（软删除）。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchMessageOperation'
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API Key认证，格式为 kb_live_xxxx
    
    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 管理员JWT Token认证

    AdminJwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        管理员 JWT Token 认证（混合权限模型）。
        该认证方式同时支持 super_admin、admin、user 三种角色，
        但具体端点的可访问性由后端根据角色进行二次校验。
        不同角色调用同一端点可能返回不同的数据范围或 403 响应。

  parameters:
    EntryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 知识条目ID
    
    ApiKeyId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: API Key ID

    AdminUserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 管理员用户ID

    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 分类ID

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    PasswordChangeRequired:
      description: |
        当前账号处于强制改密状态（`requirePasswordChange = true`），本次请求被
        服务端拦截。客户端应将用户引导到 `PUT /admin/auth/password` 完成改密，
        改密成功后需要重新登录（所有会话会被清除）。详见文档头部的"强制改密策略"。
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        enum: [PASSWORD_CHANGE_REQUIRED]
                        example: PASSWORD_CHANGE_REQUIRED
                      message:
                        type: string
                        example: Password change required before accessing this resource
    
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ========== 通用响应 ==========
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - timestamp
          properties:
            code:
              type: string
              description: 机器可读的错误码，例如 BAD_REQUEST、UNAUTHORIZED、CATEGORY_NOT_FOUND
            message:
              type: string
              description: 人类可读的错误描述
            request_id:
              type: string
              description: 用于在日志中追踪该请求的唯一 ID（由请求头 X-Request-Id 或服务器生成）
            timestamp:
              type: string
              format: date-time
              description: 错误发生时间（ISO 8601）
    
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    # ========== 分类相关 ==========
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    CategoryWithEntryCount:
      type: object
      properties:
        name:
          type: string
        entry_count:
          type: integer
          description: 该分类下的知识条目数量
    
    CategoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CategoryWithEntryCount'
        total:
          type: integer
          description: 分类总数
    
    AdminCategoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            allOf:
              - $ref: '#/components/schemas/Category'
              - type: object
                properties:
                  entry_count:
                    type: integer
                    description: 该分类下的知识条目数量
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    
    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    
    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    
    CategoryStats:
      type: object
      properties:
        name:
          type: string
        total_entries:
          type: integer
          description: 该分类下的知识条目总数
        by_language:
          type: object
          additionalProperties:
            type: integer
          description: 按编程语言统计的条目数量
        avg_quality_score:
          type: number
          format: float
          description: 平均质量分数
    
    AdminCategoryStats:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        total_entries:
          type: integer
          description: 该分类下的知识条目总数
        by_language:
          type: object
          additionalProperties:
            type: integer
          description: 按编程语言统计的条目数量
        by_difficulty:
          type: object
          additionalProperties:
            type: integer
          description: 按难度等级(1-5)统计的条目数量
        by_framework:
          type: object
          additionalProperties:
            type: integer
          description: 按框架统计的条目数量
        avg_quality_score:
          type: number
          format: float
          description: 平均质量分数
        recent_entries:
          type: integer
          description: 最近7天新增的条目数量

    # ========== 认证相关 ==========
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: 过期时间（秒）
        requirePasswordChange:
          type: boolean
          description: |
            为 `true` 时表示该账号当前处于"强制改密"状态（新建账号、管理员重置密码、
            凭证轮换后均会进入此状态）。该标志**不是提示性字段**：服务端会在绝大多数
            受保护端点上拦截并返回 `403 PASSWORD_CHANGE_REQUIRED`，仅允许
            改密流程白名单内的端点被调用。客户端必须在检测到该标志后把用户引导到
            改密/MFA 初始化页面；详见文档头部的"强制改密策略"章节。
          example: false
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            role:
              type: string
              enum: [user, admin, super_admin]
            email:
              type: string
            isSuperAdmin:
              type: boolean
              description: 是否为超级管理员
            permissions:
              type: array
              items:
                type: string
              description: 用户拥有的权限列表
    
    MfaRequiredResponse:
      type: object
      properties:
        mfaRequired:
          type: boolean
          example: true
        tempToken:
          type: string
    
    MfaLoginRequest:
      type: object
      required:
        - tempToken
        - mfaCode
      properties:
        tempToken:
          type: string
        mfaCode:
          type: string
          minLength: 6
          maxLength: 8
    
    AdminProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin, super_admin]
        isSuperAdmin:
          type: boolean
          description: 是否为超级管理员（通过角色标志位判断）
        permissions:
          type: array
          items:
            type: string
          description: 当前用户拥有的权限列表（super_admin 返回空数组，隐式拥有所有权限）
        mfaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
    
    UpdateProfileRequest:
      type: object
      properties:
        email:
          type: string
          format: email
    
    # ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          description: 必须包含大小写字母、数字和特殊字符
    
    MfaSetupResponse:
      type: object
      properties:
        secret:
          type: string
        qrCodeUrl:
          type: string
        backupCodes:
          type: array
          items:
            type: string

    # ========== API Key相关 ==========
    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        permissions:
          type: array
          items:
            type: string
            enum: [read, write]
          default: [read, write]
          description: API Key 权限，仅支持 read 和 write
        rateLimit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        expiresAt:
          type: string
          format: date-time
    
    UpdateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        permissions:
          type: array
          items:
            type: string
            enum: [read, write]
          description: API Key 权限，仅支持 read 和 write
        rateLimit:
          type: integer
          minimum: 1
          maximum: 1000
        expiresAt:
          type: string
          format: date-time
        isActive:
          type: boolean
    
    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: 完整API Key（仅在创建或重新生成时返回）
        keyPrefix:
          type: string
          description: Key前缀，用于识别
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        rateLimit:
          type: integer
        isActive:
          type: boolean
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: 创建该 API Key 的管理员用户 ID，用于审计日志的操作者归属
        lastUsedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    
    ApiKeyListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ApiKey'

    # ========== 知识条目相关 ==========
    CreateEntryRequest:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 50000
        summary:
          type: string
          maxLength: 1000
        category:
          type: string
          maxLength: 100
          description: 分类名称，必须是已存在的分类
        tags:
          type: array
          items:
            type: string
        language:
          type: string
          maxLength: 50
        framework:
          type: string
          maxLength: 100
        difficulty_level:
          type: integer
          minimum: 1
          maximum: 5
        structured_data:
          type: object
        visibility:
          type: string
          enum: [private, public]
          default: private
          description: 条目可见性。`private` 仅创建者所属 API Key 可读取；`public` 任意有效 API Key 可读取。默认 `private`。

    UpdateEntryRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 50000
        summary:
          type: string
          maxLength: 1000
        category:
          type: string
          maxLength: 100
        tags:
          type: array
          items:
            type: string
        language:
          type: string
          maxLength: 50
        framework:
          type: string
          maxLength: 100
        difficulty_level:
          type: integer
          minimum: 1
          maximum: 5
        structured_data:
          type: object
        change_summary:
          type: string
          description: 本次修改的摘要说明
        visibility:
          type: string
          enum: [private, public]
          description: 条目可见性。仅 owner 可修改。

    CreateEntryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entry_version:
          type: integer
        visibility:
          type: string
          enum: [private, public]
        embedding_status:
          type: string
          enum: [processing, completed, failed]
        created_at:
          type: string
          format: date-time
    
    KnowledgeEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        language:
          type: string
        framework:
          type: string
        difficultyLevel:
          type: integer
        qualityScore:
          type: number
        structuredData:
          type: object
        createdBy:
          type: string
          format: uuid
          description: 创建该条目的 API Key ID（UUID 格式，非用户名）
        visibility:
          type: string
          enum: [private, public]
          description: '`private` 仅创建者所属 API Key 可读取；`public` 任意有效 API Key 可读取'
        entryVersion:
          type: integer
        isLatest:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    KnowledgeListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/KnowledgeEntry'
    
    KnowledgeVersion:
      type: object
      properties:
        version:
          type: integer
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        language:
          type: string
        framework:
          type: string
        difficultyLevel:
          type: integer
        changeSummary:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
          description: 提交此版本的 API Key ID（UUID 格式）
    
    KnowledgeStats:
      type: object
      properties:
        total:
          type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
        avgQualityScore:
          type: number
    
    AdminKnowledgeListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  title:
                    type: string
                  category:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string
                  qualityScore:
                    type: number
                  visibility:
                    type: string
                    enum: [private, public]
                    description: 创建者设置的可见性状态
                  shielded:
                    type: boolean
                    description: 是否被管理员屏蔽（屏蔽后不出现在公开列表）
                  shieldedAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: 最近一次屏蔽时间（未屏蔽时为 null）
                  createdAt:
                    type: string
                    format: date-time
                  createdBy:
                    type: string
                    format: uuid
                    description: 创建该条目的 API Key ID（UUID 格式，非用户名）

    AdminKnowledgeStats:
      type: object
      properties:
        total:
          type: integer
        shielded:
          type: integer
          description: 被屏蔽的条目数（调用者可见范围内）
        byCategory:
          type: object
          additionalProperties:
            type: integer
        avgQualityScore:
          type: number

    # ========== 管理员用户相关 ==========
    AdminUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin, super_admin]
        isActive:
          type: boolean
        mfaEnabled:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
          format: uuid
          nullable: true
          description: 创建该用户的管理员用户 ID（创建者主权）
        createdAt:
          type: string
          format: date-time

    AdminUserListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AdminUserSummary'

    CreateAdminUserRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          description: 必须包含大小写字母、数字和特殊字符
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
          default: admin
          description: 可创建的角色。`super_admin` 只能通过数据库初始化或 CLI 产生，不可通过本 API 创建。

    UpdateAdminUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin, super_admin]
        isActive:
          type: boolean

    # ========== 角色相关 ==========
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        description:
          type: string
          nullable: true
        isSystem:
          type: boolean
          description: 是否为系统角色（不可删除）
        isSuperAdmin:
          type: boolean
          description: 是否为超级管理员角色（隐式拥有所有权限）
        permissions:
          type: array
          items:
            type: string
          description: 该角色拥有的权限列表
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRoleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 角色名称，必须唯一
        description:
          type: string
          maxLength: 500
        permissions:
          type: array
          items:
            type: string
            enum:
              - users:list
              - users:manage
              - content:view_shielded
              - content:shield
              - content:unshield
              - apikeys:list
              - apikeys:manage
              - audit:read
              - analytics:read
              - system:read
              - stats:read
          description: |
            可授予自定义角色的权限列表。`roles:manage` 与系统配置权由 super_admin
            通过 `is_super_admin` 标志位隐式持有，永不出现在此列表中。
            `users:manage` / `apikeys:manage` 虽然技术上可写入此表，但服务端
            守卫会对非 super_admin 角色拒绝这些动作；建议仅向 super_admin 角色授予。

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 角色名称（系统角色不可修改名称）
        description:
          type: string
          maxLength: 500
        permissions:
          type: array
          items:
            type: string
            enum:
              - users:list
              - users:manage
              - content:view_shielded
              - content:shield
              - content:unshield
              - apikeys:list
              - apikeys:manage
              - audit:read
              - analytics:read
              - system:read
              - stats:read
          description: 同 CreateRoleRequest。

    # ========== 审计日志相关 ==========
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        # 4W1H1R 字段
        actorType:
          type: string
          enum: [admin_user, api_key, system]
          description: '操作者类型 (Who)'
        actorId:
          type: string
          format: uuid
          nullable: true
          description: 操作者ID，admin_user.id 或 api_key.id (Who)
        actorName:
          type: string
          nullable: true
          description: 操作者名称，用户名或 API Key 名称 (Who)
        actorRole:
          type: string
          nullable: true
          enum: [user, admin, super_admin]
          description: 管理员角色 (Who)
        source:
          type: string
          enum: [admin_panel, public_api, mcp, system]
          description: 操作来源 (How)
        clientInfo:
          type: object
          nullable: true
          description: '客户端结构化信息，MCP 调用时包含 mcpClient、clientVersion 等 (How)'
          properties:
            mcpClient:
              type: string
              description: MCP 客户端名称，如 cursor、claude-desktop、windsurf
            clientVersion:
              type: string
              description: 客户端版本号
            apiKeyId:
              type: string
              description: API Key ID（当 API Key 有 owner 时，actor 为 owner，此处保留 key 信息）
            apiKeyName:
              type: string
            requestId:
              type: string
              description: 请求关联 ID
        action:
          type: string
          description: '操作动作，如 admin.login、entry.create、mcp.search_knowledge (What)'
        resourceType:
          type: string
          nullable: true
          description: '资源类型，如 admin_user、knowledge、apikey、category (What)'
        resourceId:
          type: string
          format: uuid
          nullable: true
          description: 资源 ID (What)
        details:
          type: object
          nullable: true
          description: 操作详情 (What)
        ipAddress:
          type: string
          nullable: true
          description: '客户端 IP 地址 (Where)'
        userAgent:
          type: string
          nullable: true
          description: '客户端 User-Agent (How)'
        httpStatusCode:
          type: integer
          nullable: true
          description: 'HTTP 状态码 (Result)，由中间件在响应完成后自动补写'
        status:
          type: string
          enum: [success, failure, error]
          nullable: true
          description: '操作结果状态 (Result)：success=正常完成，failure=预期拒绝（密码错误、token 过期、权限不足），error=非预期系统异常'
        errorMessage:
          type: string
          nullable: true
          description: '错误信息 (Result)'
        createdAt:
          type: string
          format: date-time
          description: '操作时间 (When)'
    
    AuditLogListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AuditLog'

    # ========== 系统消息相关 ==========
    MessageType:
      type: string
      enum: [announcement, approval, system]
      description: 消息类型

    TargetType:
      type: string
      enum: [all, users, role, permission]
      description: 消息目标类型

    MessageListItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        type:
          $ref: '#/components/schemas/MessageType'
        isRead:
          type: boolean
        isStarred:
          type: boolean
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true

    MessageDetail:
      allOf:
        - $ref: '#/components/schemas/MessageListItem'
        - type: object
          properties:
            sender:
              type: object
              nullable: true
              properties:
                id:
                  type: string
                name:
                  type: string
            metadata:
              type: object
              nullable: true
              description: 消息元数据

    MessageListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MessageListItem'
        total:
          type: integer
        unreadCount:
          type: integer

    SendMessageRequest:
      type: object
      required:
        - title
        - content
        - type
        - targetType
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
        type:
          $ref: '#/components/schemas/MessageType'
        targetType:
          $ref: '#/components/schemas/TargetType'
        targetValue:
          type: array
          items:
            type: string
          description: 目标值数组（当 targetType 为 users、role 或 permission 时必填）
        metadata:
          type: object
          description: 消息元数据

    SendMessageResponse:
      type: object
      properties:
        success:
          type: boolean
        messageId:
          type: string
        recipientCount:
          type: integer
          description: 接收者数量

    UnreadCountResponse:
      type: object
      properties:
        count:
          type: integer

    BatchMessageOperation:
      type: object
      required:
        - messageIds
      properties:
        messageIds:
          type: array
          items:
            type: string
          description: 消息ID列表

    BatchOperationResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
          description: 操作成功的数量

    # ========== 系统统计相关 ==========
    SystemStats:
      type: object
      properties:
        knowledgeEntries:
          type: object
          properties:
            total:
              type: integer
            byCategory:
              type: object
              additionalProperties:
                type: integer
            avgQualityScore:
              type: number
        apiKeys:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            expired:
              type: integer
        requests:
          type: object
          properties:
            today:
              type: integer
            thisWeek:
              type: integer
            thisMonth:
              type: integer
