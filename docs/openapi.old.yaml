  # ==================== 知识条目管理 ====================
  /admin/knowledge:
    get:
      tags:
        - Admin Knowledge
      summary: 管理端查询知识条目列表
      description: |
        需要 admin 或 super_admin 权限。返回所有条目（不应用 visibility 过滤），并透出每行的 `visibility` 字段。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: 搜索标题或内容
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminKnowledgeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/knowledge/stats:
    get:
      tags:
        - Admin Knowledge
      summary: 知识库统计信息
      description: 需要 admin 或 super_admin 权限
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminKnowledgeStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/knowledge/batch-delete:
    post:
      tags:
        - Admin Knowledge
      summary: 批量删除知识条目
      description: |
        需要 admin 或 super_admin 权限。批量执行软删除，用于内容审核与违规批量下架。不修改任何条目的内容或可见性。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Knowledge entries deleted
                  deleted:
                    type: integer
                    description: 实际删除的条目数（不含已删除的）
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/knowledge/{id}:
    get:
      tags:
        - Admin Knowledge
      summary: 获取知识条目详情
      description: 需要 admin 或 super_admin 权限
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Admin Knowledge
      summary: 删除知识条目
      description: |
        需要 admin 或 super_admin 权限。执行软删除（`deleted_at` 置位）。用于内容审核与违规下架，不影响创建者对条目的编辑权（创建者通过业务 API 仍可修改与恢复）。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 管理员用户管理 ====================
  /admin/users:
    get:
      tags:
        - Admin Users
      summary: 获取管理员用户列表
      description: |
        需要 `users:read` 权限。super_admin 可以查看所有用户；其他角色只能查看自己创建的用户（创建者主权）。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Admin Users
      summary: 创建管理员用户
      description: |
        需要 `users:write` 权限。super_admin 可以创建任何角色的用户并可指定角色；其他角色只能创建 user 角色的用户，且创建者自动记录为 createdBy。新用户首次登录需修改密码。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminUserRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 用户名已存在

  /admin/users/{id}:
    get:
      tags:
        - Admin Users
      summary: 获取管理员用户详情
      description: |
        需要 `users:read` 权限。super_admin 可以查看任何用户；其他角色只能查看自己创建的用户。尝试查看无权限的用户返回 404（不暴露存在性）。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/AdminUserId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Admin Users
      summary: 更新管理员用户
      description: |
        需要 `users:write` 权限。super_admin 可以更新任何用户并修改角色；其他角色只能更新自己创建的用户，且不可修改角色。
        
        系统会保护最后一个活跃的 super_admin：尝试降级或停用最后一个活跃 super_admin 将返回 400。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/AdminUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Admin Users
      summary: 删除管理员用户
      description: |
        需要 `users:write` 权限。super_admin 可以删除任何用户（除了自己和其他 super_admin）；其他角色只能删除自己创建的用户。
        
        不允许删除自己，也不允许删除最后一个 super_admin。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/AdminUserId'
      responses:
        '204':
          description: 删除成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/users/{id}/reset-password:
    post:
      tags:
        - Admin Users
      summary: 重置管理员密码
      description: |
        需要 `users:write` 权限。super_admin 可以重置任何用户的密码；其他角色只能重置自己创建的用户的密码。
        生成一个新的临时密码并强制该用户下次登录时修改。临时密码**仅在此响应中返回一次**，请通过安全渠道交给目标用户，且不在任何地方持久化明文。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/AdminUserId'
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  temporaryPassword:
                    type: string
                    description: 一次性临时密码，请立即安全转交
                  requirePasswordChange:
                    type: boolean
                    example: true
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 角色管理 ====================
  /admin/roles:
    get:
