        - Admin Roles
      summary: 获取角色列表
      description: |
        仅 super_admin 可访问。返回所有角色及其权限配置。系统角色（is_system=true）不可删除，但可修改描述和权限。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Admin Roles
      summary: 创建自定义角色
      description: |
        仅 super_admin 可访问。创建新的自定义角色。角色名称不能与系统角色重复。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 角色名称已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/roles/{id}:
    get:
      tags:
        - Admin Roles
      summary: 获取角色详情
      description: 仅 super_admin 可访问。
