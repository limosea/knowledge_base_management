servers:
  - url: http://localhost:3000/api/v1
    description: 本地开发环境
  - url: http://limousea.asia:3000/api/v1
    description: 生产环境

tags:
  - name: Health
    description: 健康检查接口
  - name: Knowledge
    description: 知识条目业务接口
  - name: Categories
    description: 分类查询业务接口
  - name: MCP
    description: Model Context Protocol 接口，供 AI Agent（如 Claude Desktop、Cursor 等）通过 MCP 协议查询知识库
  - name: Admin Auth
    description: 管理员认证接口
  - name: Admin Elevation
    description: |
      高级控制台的 step-up 提权接口。用户在从"个人控制台"切换到"高级控制台"时
      必须通过 TOTP 重新验证，服务端在会话上写入 `elevated_until`（默认 15 分钟）。
      高级控制台的受保护路由通过 `@RequireElevated()` 守卫拒绝未提权的请求（403
      `ELEVATION_REQUIRED`）。MFA 是提权的前置条件。
  - name: Admin API Keys
    description: API Key管理接口
  - name: Admin Knowledge
    description: 知识条目管理接口
  - name: Admin Categories
    description: 分类管理接口
  - name: Admin Users
    description: 管理员用户管理接口
  - name: Admin Roles
    description: |
      角色管理接口（仅 super_admin 可访问）。
      
      系统预置三个系统角色：
      - `super_admin`: 超级管理员，隐式拥有所有权限
      - `admin`: 管理员，通过 role_permissions 配置权限
      - `user`: 普通用户，自助服务权限
      
      系统角色不可删除，但可修改描述和权限。自定义角色可完全管理。
  - name: Admin Audit Logs
    description: |
      审计日志接口，遵循 4W1H1R 原则：
      Who（操作者及角色）、When（操作时间）、Where（IP 地址）、
      What（操作动作 + 资源）、How（来源渠道 + 客户端信息）、Result（操作结果）
  - name: Admin System
    description: 系统监控接口
  - name: Admin Stats
    description: 数据统计分析接口
  - name: Admin Self-Service
    description: 管理员自助服务接口，供普通用户管理自己的 API Key 和查看个人统计
  - name: Admin Messages
    description: |
      系统消息管理接口。支持消息的发送、查询、标记已读、收藏、删除等操作。
      消息类型包括：system（系统通知）、notification（业务通知）、alert（告警）。
      消息目标支持：all（全体用户）、role（指定角色）、user（指定用户）。

paths:
  # ==================== 健康检查 ====================
  /health:
    get:
      tags:
        - Health
      summary: 存活探针（Liveness）
      description: |
        轻量级存活探针，**无需认证**。仅供容器编排（Dockerfile HEALTHCHECK、
        compose healthcheck、nginx）和负载均衡轮询使用。

        该端点不做任何数据库或依赖探测，也不泄露内部状态（无延迟、无版本、
        无后端类型），仅返回固定的 `{status: "ok"}` 表示进程存活并可接受请求。

        深度就绪检查（DB 连通性等）请使用受保护的管理端接口
        `/admin/system/health`。

        路径同时挂载在 `/health`（无前缀，供探针调用）和 `/api/v1/health`
        （Nest 管理路由），两者行为一致。
      security: []
      responses:
        '200':
          description: 进程存活
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

  # ==================== 知识条目业务API ====================
  /knowledge:
    get:
      tags:
        - Knowledge
      summary: 查询知识条目列表
      description: |
        需要 `read` API Key 权限。仅返回当前 API Key 可见的条目：`visibility='public'` 的条目，加上 `created_by` 等于当前 API Key ID 的私有条目。
      security:
        - ApiKeyAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: tags
          in: query
          description: 逗号分隔的标签列表
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - Knowledge
      summary: 创建知识条目
      description: |
        需要 `write` API Key 权限。新条目默认 `visibility='private'`（仅当前 API Key 可见）；可在请求体中显式传 `visibility: 'public'` 以允许其他 API Key 读取。`created_by` 自动绑定为当前 API Key ID。
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntryRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEntryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /knowledge/stats:
    get:
      tags:
        - Knowledge
      summary: 获取知识库统计信息
      description: |
        需要 `read` API Key 权限。统计结果仅包含当前 API Key 可见的条目（`visibility='public'` 加上当前 Key 创建的私有条目）。
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /knowledge/search:
    post:
      tags:
        - Knowledge
      summary: 搜索知识条目
      description: |
        需要 `read` API Key 权限。基于语义和关键词的混合搜索。可见性过滤在向量召回阶段即生效：私有条目不会通过相似性搜索泄露给非 owner。
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                filters:
                  type: object
                  properties:
                    category:
                      type: string
                    language:
                      type: string
                    tags:
                      type: array
                      items:
                        type: string
                    difficulty_level:
                      type: array
                      items:
                        type: integer
                    created_after:
                      type: string
                      format: date-time
                    created_before:
                      type: string
                      format: date-time
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 20
                offset:
                  type: integer
                  minimum: 0
                  default: 0
                use_rerank:
                  type: boolean
                  default: false
                weights:
                  type: object
                  properties:
                    semantic:
                      type: number
                      minimum: 0
                      maximum: 1
                    keyword:
                      type: number
                      minimum: 0
                      maximum: 1
                    recency:
                      type: number
                      minimum: 0
                      maximum: 1
                    quality:
                      type: number
                      minimum: 0
                      maximum: 1
                    popularity:
                      type: number
                      minimum: 0
                      maximum: 1
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        title:
                          type: string
                        summary:
                          type: string
                        category:
                          type: string
                        tags:
                          type: array
                          items:
                            type: string
                        difficulty_level:
                          type: integer
                        score:
                          type: object
                          properties:
                            final:
                              type: number
                            semantic:
                              type: number
                            keyword:
                              type: number
                        created_at:
                          type: string
                          format: date-time
                  query_time_ms:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: 搜索服务暂时不可用

  /knowledge/{id}:
    get:
      tags:
        - Knowledge
      summary: 获取知识条目详情
      description: |
        需要 `read` API Key 权限。私有条目仅 owner 可读；非 owner 访问私有条目或不存在条目一律返回 404（不暴露存在性）。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      tags:
        - Knowledge
      summary: 更新知识条目
      description: |
        需要 write 权限，且调用方必须是该条目的所有者（`created_by` 与
        当前 API Key 一致）。只有创建者可修改自己创建的条目。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntryRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Knowledge
      summary: 删除知识条目
      description: |
        需要 write 权限，且调用方必须是该条目的所有者（`created_by` 与
        当前 API Key 一致）。执行软删除。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /knowledge/{id}/versions:
    get:
      tags:
        - Knowledge
      summary: 获取知识条目版本历史
      description: 调用方必须是该条目的所有者。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeVersion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /knowledge/{id}/versions/{version}/restore:
    post:
      tags:
        - Knowledge
      summary: 恢复到指定版本
      description: 需要 write 权限，且调用方必须是该条目的所有者。
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
        - name: version
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 恢复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 分类业务API ====================
  /categories:
    get:
      tags:
        - Categories
      summary: 获取分类列表
      description: 返回所有分类及其关联的知识条目数量
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /categories/{name}/stats:
    get:
      tags:
        - Categories
      summary: 获取分类统计信息
      description: 返回指定分类的统计信息，包括条目数量、按语言分布、平均质量分数等
      security:
        - ApiKeyAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: 分类名称
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== MCP (Model Context Protocol) ====================
  /mcp:
    post:
      tags:
        - MCP
      summary: MCP 协议端点
      description: |
        Model Context Protocol (MCP) 端点，供 AI Agent（如 Claude Desktop、Cursor 等）
        通过 MCP 协议查询知识库。使用 Streamable HTTP 传输，无状态模式。

        支持以下 MCP 工具（Tools）：
        - `search_knowledge`: 语义+关键词混合搜索知识条目（受 visibility 过滤，私有条目不向非 owner 暴露）
        - `get_knowledge_entry`: 按 UUID 获取知识条目详情（受 visibility 过滤；需绑定 API Key）
        - `list_categories`: 列出所有分类及可见条目数（按 visibility 聚合）
        - `get_category_stats`: 获取分类统计信息（按 visibility 聚合）
        - `get_knowledge_stats`: 获取知识库整体统计（按 visibility 聚合；需绑定 API Key）

        通信流程遵循 MCP 规范：客户端首先发送 `initialize` 握手，然后通过 `tools/list`
        和 `tools/call` 方法调用上述工具。请求体为 JSON-RPC 2.0 格式，响应同样为 JSON-RPC 2.0。

        **审计日志（4W1H1R）：** 所有 MCP 工具调用均自动记录审计日志，包括操作者（API Key / owner）、
        来源 IP、User-Agent、调用工具名、输入参数摘要、耗时及结果。客户端可通过
        `X-MCP-Client` 请求头标识自身（如 `cursor/0.45.1`），未提供时系统将从
        User-Agent 自动解析已知客户端（Cursor、Claude Desktop、Windsurf 等）。
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: JSON-RPC 2.0 请求（MCP 协议消息）
              properties:
                jsonrpc:
                  type: string
                  enum: ['2.0']
                method:
                  type: string
                  description: 'MCP 方法名，如 initialize、tools/list、tools/call'
                params:
                  type: object
                  description: 方法参数（具体取决于 MCP 方法）
                id:
                  description: JSON-RPC 请求 ID
      responses:
        '200':
          description: JSON-RPC 2.0 响应
          content:
            application/json:
              schema:
                type: object
                description: JSON-RPC 2.0 响应
                properties:
                  jsonrpc:
                    type: string
                    enum: ['2.0']
                  result:
                    type: object
                    description: 成功时的结果
                  error:
                    type: object
                    description: 失败时的错误信息
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  id:
                    description: 对应请求的 JSON-RPC ID
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== 管理员认证 ====================
  /admin/auth/login:
    post:
      tags:
        - Admin Auth
      summary: 管理员登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '201':
          description: 登录成功（MFA启用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaRequiredResponse'
        '401':
          description: 凭证无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/auth/login/mfa:
    post:
      tags:
        - Admin Auth
      summary: MFA验证登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaLoginRequest'
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: MFA验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/auth/logout:
    post:
      tags:
        - Admin Auth
      summary: 管理员登出
      description: |
        吊销当前请求使用的 access token 对应的 `admin_sessions` 行。

        该端点**位于强制改密白名单内**：即便调用者账号处于
        `requirePasswordChange = true` 状态也可以访问，便于用户在强制改密页面上
        选择"退出登录"。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/refresh:
    post:
      tags:
        - Admin Auth
      summary: 刷新Token
      description: 使用refreshToken获取新的accessToken，无需Authorization头
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/profile:
    get:
      tags:
        - Admin Auth
      summary: 获取个人信息
      description: |
        返回当前登录用户的基本资料（id / username / email / role / 权限 / MFA 状态）。

        该端点**位于强制改密白名单内**：即便调用者账号处于
        `requirePasswordChange = true` 状态也可以访问，便于强制改密页面展示当前
        用户名与 MFA 状态。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags:
        - Admin Auth
      summary: 更新个人信息
      description: |
        修改当前用户的个人档案（如 email）。该端点**不在强制改密白名单内**：
        账号处于 `requirePasswordChange = true` 时调用会返回
        `403 PASSWORD_CHANGE_REQUIRED`，必须先用 `PUT /admin/auth/password`
        完成改密。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'

  /admin/auth/password:
    put:
      tags:
        - Admin Auth
      summary: 修改密码
      description: |
        修改当前登录用户的密码。该端点**位于强制改密白名单内**：即便调用者账号处于
        `requirePasswordChange = true` 状态也可以访问，是首次登录流程中客户端必须调用的
        端点。

        成功后服务端会把 `requirePasswordChange` 置为 `false` 并**删除该用户名下的
        全部 `admin_sessions` 行**（含本次调用使用的 access token），因此客户端在
        收到 `200` 后必须使用新密码重新登录，不能继续复用旧 token。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功（注意：当前 token 已被失效，必须重新登录）
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password changed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/mfa/setup:
    post:
      tags:
        - Admin Auth
      summary: 设置MFA
      description: |
        生成MFA密钥和二维码URL。

        该端点**位于强制改密白名单内**：即便调用者账号处于
        `requirePasswordChange = true` 状态也可以访问，便于首次登录流程中
        先完成 MFA 注册再改密。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/mfa/enable:
    post:
      tags:
        - Admin Auth
      summary: 启用MFA
      description: |
        用 `setup` 返回的 secret 在客户端生成 TOTP 后提交 6 位验证码完成启用。

        该端点**位于强制改密白名单内**：即便调用者账号处于
        `requirePasswordChange = true` 状态也可以访问，便于首次登录流程中
        先完成 MFA 注册再改密。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: MFA验证码
      responses:
        '200':
          description: 启用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: MFA enabled successfully
        '400':
          description: 验证码无效
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invalid MFA code
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/auth/mfa/disable:
    post:
      tags:
        - Admin Auth
      summary: 禁用MFA
      description: |
        提交当前 TOTP 验证码关闭 MFA。该端点**不在强制改密白名单内**：
        账号处于 `requirePasswordChange = true` 时调用会返回
        `403 PASSWORD_CHANGE_REQUIRED`，必须先用 `PUT /admin/auth/password`
        完成改密。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: MFA验证码
      responses:
        '200':
          description: 禁用成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: MFA disabled successfully
        '400':
          description: MFA未启用
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: MFA is not enabled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'

  # ==================== 管理员自助服务 ====================
  /admin/me/api-keys:
    get:
      tags:
        - Admin Self-Service
      summary: 获取自己的 API Key 列表
      description: |
        普通用户自助服务接口。返回当前登录用户自己创建的 API Key 列表。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'

    post:
      tags:
        - Admin Self-Service
      summary: 创建自己的 API Key
      description: |
        普通用户自助服务接口。新创建的 Key 的 `owner_id` 自动绑定为当前调用者。
        当前用户为 user 角色时，即便请求 `admin` 权限也会被服务端剥离为 `["read"]`。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'

  /admin/me/api-keys/{id}:
    get:
      tags:
        - Admin Self-Service
      summary: 获取自己的 API Key 详情
      description: |
        普通用户自助服务接口。只能查看自己名下的 Key；非 owner 调用返回 404。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      tags:
        - Admin Self-Service
      summary: 更新自己的 API Key
      description: |
        普通用户自助服务接口。只能修改自己名下的 Key，且不得修改 `isActive` 字段。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApiKeyRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Admin Self-Service
      summary: 删除自己的 API Key
      description: |
        普通用户自助服务接口。只能删除自己名下的 Key。关联的 audit_logs / request_logs 行的 api_key_id 将被置为 NULL（ON DELETE SET NULL），不会级联删除日志。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/me/api-keys/{id}/regenerate:
    post:
      tags:
        - Admin Self-Service
      summary: 重新生成自己的 API Key
      description: |
        普通用户自助服务接口。废弃旧 Key 并生成新 Key，只能重新生成自己名下的 Key。返回完整的 ApiKey 对象，包含新生成的明文 key。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 重新生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/me/stats:
    get:
      tags:
        - Admin Self-Service
      summary: 获取自己的统计 Dashboard
      description: |
        普通用户自助服务接口。返回当前用户自己名下 API Key 的请求统计与汇总数据。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKeys:
                    type: object
                    properties:
                      total:
                        type: integer
                      active:
                        type: integer
                  requests:
                    type: object
                    properties:
                      today:
                        type: integer
                      thisWeek:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== Step-up Elevation ====================
  /admin/elevation/step-up:
    post:
      tags:
        - Admin Elevation
      summary: 通过 TOTP 进入高级控制台
      description: |
        用 6 位 TOTP 码重新验证调用者身份，将当前会话的 `elevated_until` 设为
        `NOW() + 15 分钟`。重复调用会刷新过期时间。

        前置条件：调用者必须已启用 MFA（`admin_users.mfa_enabled = true`）。
        否则返回 `409 MFA_NOT_ENABLED` 并提示先走 `/admin/auth/mfa/setup` + `enable`。

        成功：`200` 返回 `elevatedUntil`（ISO 时间戳）与 `expiresIn`（秒）。
        失败：`403` 表示 TOTP 码错误；`409` 表示尚未启用 MFA。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 8
                  description: 当前 TOTP 验证码（不支持备用码）
      responses:
        '200':
          description: 提权成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  elevated:
                    type: boolean
                    example: true
                  elevatedUntil:
                    type: string
                    format: date-time
                  expiresIn:
                    type: integer
                    description: 剩余秒数（默认 900）
        '403':
          description: TOTP 码无效
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Invalid TOTP code
        '409':
          description: 用户尚未启用 MFA
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 409
                  code:
                    type: string
                    example: MFA_NOT_ENABLED
                  message:
                    type: string
                  mfaSetupEndpoint:
                    type: string
                    example: /admin/auth/mfa/setup
                  mfaEnableEndpoint:
                    type: string
                    example: /admin/auth/mfa/enable

  /admin/elevation/status:
    get:
      tags:
        - Admin Elevation
      summary: 查询当前会话的提权状态与权限分解
      description: |
        返回调用者当前会话的提权状态、剩余 TTL、MFA 启用状态，以及按基线 /
        高级拆分的权限列表。前端依据 `permissions.elevated_only` 是否为空决定
        是否显示高级控制台入口。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  elevated:
                    type: boolean
                  elevatedUntil:
                    type: string
                    format: date-time
                    nullable: true
                  remainingSeconds:
                    type: integer
                  mfaEnabled:
                    type: boolean
                  isSuperAdmin:
                    type: boolean
                  permissions:
                    type: object
                    properties:
                      held:
                        type: array
                        items:
                          type: string
                        description: 当前持有的所有权限（super_admin 为完整集合）
                      baseline:
                        type: array
                        items:
                          type: string
                        description: 个人控制台可用权限
                      elevated_only:
                        type: array
                        items:
                          type: string
                        description: 仅在高级控制台可用的权限

  /admin/elevation/revoke:
    post:
      tags:
        - Admin Elevation
      summary: 退出高级控制台
      description: |
        清除当前会话的 `elevated_until`（等价于 `elevated=false`）。幂等：未提权
        的会话调用也返回 200。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  elevated:
                    type: boolean
                    example: false

  # ==================== API Key管理 ====================
  /admin/api-keys:
    get:
      tags:
        - Admin API Keys
      summary: 获取API Key列表
      description: |
        需要 `apikeys:list` 权限（admin 默认持有，super_admin 隐式持有）。
        **elevation-aware**：未提权时仅返回调用者名下 Key；提权后返回全站 Key 列表。
        user 角色请使用 `/admin/me/api-keys`。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Admin API Keys
      summary: 创建API Key
      description: |
        需要 `apikeys:manage` 权限与 step-up 提权（`POST /admin/elevation/step-up`）。
        新创建的 Key 的 `owner_id`
        自动绑定为当前调用者。user 角色请使用 `/admin/me/api-keys`。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/api-keys/{id}:
    get:
      tags:
        - Admin API Keys
      summary: 获取API Key详情
      description: |
        需要 `apikeys:list` 权限。可读取任何 Key 的详情。user 角色请使用 `/admin/me/api-keys/{id}`。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      tags:
        - Admin API Keys
      summary: 更新API Key
      description: |
        需要 `apikeys:manage` 权限与 step-up 提权（高级控制台）。可修改任何 Key。user 角色请使用 `/admin/me/api-keys/{id}`。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApiKeyRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Admin API Keys
      summary: 删除API Key
      description: |
        需要 `apikeys:manage` 权限与 step-up 提权（高级控制台）。可吊销任何 Key。user 角色请使用 `/admin/me/api-keys/{id}`。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/api-keys/{id}/regenerate:
    post:
      tags:
        - Admin API Keys
      summary: 重新生成API Key
      description: |
        需要 `apikeys:manage` 权限与 step-up 提权（高级控制台）。可重新生成任何 Key 的凭证。user 角色请使用 `/admin/me/api-keys/{id}/regenerate`。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 重新生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ==================== 分类管理 ====================
  /admin/categories:
    get:
      tags:
        - Admin Categories
      summary: 获取分类列表
      description: 返回所有分类及其关联的知识条目数量，支持分页和搜索。任何已登录管理员均可调用。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: 按分类名称模糊搜索
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - Admin Categories
      summary: 创建分类
      description: 需要 `content:shield` 权限与 step-up 提权（高级控制台）。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 分类名称已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/categories/{id}:
    get:
      tags:
        - Admin Categories
      summary: 获取分类详情
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      tags:
        - Admin Categories
      summary: 更新分类
      description: 需要 `content:shield` 权限与 step-up 提权（高级控制台）。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 分类名称已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    delete:
      tags:
        - Admin Categories
      summary: 删除分类
      description: 需要 `content:shield` 权限与 step-up 提权（高级控制台）。只能删除没有关联知识条目的分类。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '204':
          description: 删除成功
        '400':
          description: 分类下存在知识条目，无法删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/categories/{id}/stats:
    get:
      tags:
        - Admin Categories
      summary: 获取分类统计信息
      description: 返回指定分类的详细统计，包括按语言、难度、框架分布，平均质量分数，最近新增条目数等
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 知识条目管理 ====================
  /admin/knowledge:
    get:
      tags:
        - Admin Knowledge
      summary: 管理端查询知识条目列表
      description: |
        任何已登录管理员均可调用（无权限守卫），由服务端按调用者身份决定可见范围：
        - `super_admin`：所有条目
        - 持有 `content:view_shielded`：公开条目（含屏蔽）+ 自己名下全部条目
        - 其他：公开且未屏蔽条目 + 自己名下全部条目

        响应透出每行的 `visibility`、`shielded`、`shieldedAt` 字段。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: 搜索标题或内容
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminKnowledgeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/knowledge/stats:
    get:
      tags:
        - Admin Knowledge
      summary: 知识库统计信息
      description: |
        任何已登录管理员均可调用。统计范围按调用者身份过滤（与 `/admin/knowledge` 同规则），
        并额外返回 `shielded`（屏蔽条目数）。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminKnowledgeStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/knowledge/batch-shield:
    post:
      tags:
        - Admin Knowledge
      summary: 批量屏蔽知识条目
      description: |
        需要 `content:shield` 权限与 step-up 提权（高级控制台）。将匹配条目的 `shielded` 置为 `true`、`shieldedAt`
        置为当前时间，不修改原始内容。已经屏蔽或已被软删除的条目计入 `skipped`。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: 屏蔽完成
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Entries processed
                  shielded:
                    type: integer
                    description: 本次实际新屏蔽的条目数
                  skipped:
                    type: integer
                    description: 已屏蔽/已删除/不存在的条目数
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/knowledge/batch-unshield:
    post:
      tags:
        - Admin Knowledge
      summary: 批量解除屏蔽
      description: |
        需要 `content:unshield` 权限与 step-up 提权（高级控制台）。将匹配条目的 `shielded` 置为 `false`、
        `shieldedAt` 置为 NULL，恢复公开可见。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: 解除完成
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Entries processed
                  unshielded:
                    type: integer
                    description: 本次实际解除屏蔽的条目数
                  skipped:
                    type: integer
                    description: 未屏蔽/已删除/不存在的条目数
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/knowledge/{id}:
    get:
      tags:
        - Admin Knowledge
      summary: 获取知识条目详情
      description: |
        任何已登录管理员均可调用，但受身份作用域限制：
        - `super_admin`：任何条目
        - 持有 `content:view_shielded`：公开条目（含屏蔽）+ 自己名下条目
        - 其他：公开且未屏蔽 + 自己名下条目
        不可见的条目统一返回 404（不暴露存在性）。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/knowledge/{id}/shield:
    post:
      tags:
        - Admin Knowledge
      summary: 屏蔽知识条目
      description: |
        需要 `content:shield` 权限与 step-up 提权（高级控制台）。将 `shielded` 置为 `true`、`shieldedAt` 置为当前时间。
        已屏蔽的条目再次调用将返回 400。
        此动作不修改原始数据，仅影响公开列表的可见性；owner 通过业务 API 仍可编辑与软删除。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 屏蔽成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/knowledge/{id}/unshield:
    post:
      tags:
        - Admin Knowledge
      summary: 解除知识条目屏蔽
      description: |
        需要 `content:unshield` 权限与 step-up 提权（高级控制台）。将 `shielded` 置为 `false`、`shieldedAt` 置为 NULL。
        未屏蔽的条目再次调用将返回 400。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 解除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/knowledge/{id}/self-shield:
    post:
      tags:
        - Admin Knowledge
      summary: 屏蔽自己创建的知识条目
      description: |
        需要认证。条目所有者主动屏蔽自己创建的条目，使其从公开列表隐藏。
        仅条目所有者可操作，且条目必须是 `visibility=public` 状态。
        操作后 `shielded=true`，`shieldedAt` 记录操作时间。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 屏蔽成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '400':
          description: 条目未公开或已被屏蔽
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 非条目所有者
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/knowledge/{id}/self-unshield:
    post:
      tags:
        - Admin Knowledge
      summary: 解除屏蔽自己创建的知识条目
      description: |
        需要认证。条目所有者解除对自己条目的屏蔽，恢复公开可见。
        仅条目所有者可操作，且条目必须处于 `shielded=true` 状态。
        操作后 `shielded=false`，`shieldedAt` 置为 null。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/EntryId'
      responses:
        '200':
          description: 解除屏蔽成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeEntry'
        '400':
          description: 条目未被屏蔽
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 非条目所有者
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 管理员用户管理 ====================
  /admin/users:
    get:
      tags:
        - Admin Users
      summary: 获取管理员用户列表
      description: |
        需要 `users:list` 权限。**elevation-aware**：未提权时仅返回调用者自己创建的用户
        （创建者主权）；提权后返回全站用户。super_admin 始终看到全部。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: |
            以下任一情况都会返回 `403`：
            - `code = FORBIDDEN`：调用者缺少 `users:list` 权限或未进入高级控制台（step-up 提权）。
            - `code = PASSWORD_CHANGE_REQUIRED`：调用者尚未完成强制改密，必须先调用
              `PUT /admin/auth/password`，详见文档头部的"强制改密策略"。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Admin Users
      summary: 创建管理员用户
      description: |
        需要 `users:manage` 权限与 step-up 提权（高级控制台）。super_admin 可以创建任何角色的用户并可指定角色；其他角色只能创建 user 角色的用户，且创建者自动记录为 createdBy。新用户首次登录需修改密码。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminUserRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 用户名已存在

  /admin/users/{id}:
    get:
      tags:
        - Admin Users
      summary: 获取管理员用户详情
      description: |
        需要 `users:list` 权限。**elevation-aware**：未提权时只能查看自己创建的用户；
        提权后可查看任何用户。super_admin 始终可见。尝试查看无权限的用户返回 404（不暴露存在性）。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/AdminUserId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Admin Users
      summary: 更新管理员用户
      description: |
        需要 `users:manage` 权限与 step-up 提权（高级控制台）。super_admin 可以更新任何用户并修改角色；其他角色只能更新自己创建的用户，且不可修改角色。
        
        系统会保护最后一个活跃的 super_admin：尝试降级或停用最后一个活跃 super_admin 将返回 400。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/AdminUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Admin Users
      summary: 删除管理员用户
      description: |
        需要 `users:manage` 权限与 step-up 提权（高级控制台）。super_admin 可以删除任何用户（除了自己和其他 super_admin）；其他角色只能删除自己创建的用户。
        
        不允许删除自己，也不允许删除最后一个 super_admin。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/AdminUserId'
      responses:
        '204':
          description: 删除成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/users/{id}/reset-password:
    post:
      tags:
        - Admin Users
      summary: 重置管理员密码
      description: |
        需要 `users:manage` 权限与 step-up 提权（高级控制台）。super_admin 可以重置任何用户的密码；其他角色只能重置自己创建的用户的密码。
        生成一个新的临时密码并强制该用户下次登录时修改。临时密码**仅在此响应中返回一次**，请通过安全渠道交给目标用户，且不在任何地方持久化明文。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/AdminUserId'
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  temporaryPassword:
                    type: string
                    description: 一次性临时密码，请立即安全转交
                  requirePasswordChange:
                    type: boolean
                    example: true
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 角色管理 ====================
  /admin/roles:
    get:
      tags:
        - Admin Roles
      summary: 获取角色列表
      description: |
        仅 super_admin 可访问，且需 step-up 提权（高级控制台）。返回所有角色及其权限配置。系统角色（is_system=true）不可删除，但可修改描述和权限。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Admin Roles
      summary: 创建自定义角色
      description: |
        仅 super_admin 可访问，且需 step-up 提权（高级控制台）。创建新的自定义角色。角色名称不能与系统角色重复。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 角色名称已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/roles/{id}:
    get:
      tags:
        - Admin Roles
      summary: 获取角色详情
      description: 仅 super_admin 可访问，且需 step-up 提权（高级控制台）。
      security:
        - AdminAuth: []
