                    format: date-time
                  to:
                    type: string
                    format: date-time
                  statusCodeDistribution:
                    type: array
                    description: 按 HTTP 状态码统计请求数
                    items:
                      type: object
                      properties:
                        code:
                          type: integer
                          description: HTTP 状态码
                        count:
                          type: integer
                  successRate:
                    type: object
                    description: 请求成功率汇总
                    properties:
                      total:
                        type: integer
                        description: 总请求数
                      success2xx:
                        type: integer
                        description: 2xx 响应数
                      clientError4xx:
                        type: integer
                        description: 4xx 响应数
                      serverError5xx:
                        type: integer
                        description: 5xx 响应数
                  requestVolumeTrend:
                    type: array
                    description: 请求量时间趋势
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          description: 日期（YYYY-MM-DD）
                        total:
                          type: integer
                          description: 该时段总请求数
                        errors:
                          type: integer
                          description: 该时段错误请求数（4xx + 5xx）
                  latencyStats:
                    type: object
                    description: 响应延迟统计（单位：毫秒）
                    properties:
                      avgMs:
                        type: integer
                        description: 平均响应时间
                      p50Ms:
                        type: integer
                        description: P50 响应时间
                      p95Ms:
                        type: integer
                        description: P95 响应时间
                  topEndpoints:
                    type: array
                    description: 热门端点 Top 20
                    items:
                      type: object
                      properties:
                        method:
                          type: string
                          description: HTTP 方法
                        path:
                          type: string
                          description: 请求路径
                        count:
                          type: integer
                          description: 请求数
                        avgResponseTime:
                          type: integer
                          description: 平均响应时间（毫秒）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: API Key认证，格式为 kb_live_xxxx
    
    AdminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 管理员JWT Token认证

    AdminJwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        管理员 JWT Token 认证（混合权限模型）。
        该认证方式同时支持 super_admin、admin、user 三种角色，
        但具体端点的可访问性由后端根据角色进行二次校验。
        不同角色调用同一端点可能返回不同的数据范围或 403 响应。

  parameters:
    EntryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 知识条目ID
    
    ApiKeyId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: API Key ID

    AdminUserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 管理员用户ID

    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: 分类ID

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Unauthorized:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ========== 通用响应 ==========
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - timestamp
          properties:
            code:
              type: string
              description: 机器可读的错误码，例如 BAD_REQUEST、UNAUTHORIZED、CATEGORY_NOT_FOUND
            message:
              type: string
              description: 人类可读的错误描述
            request_id:
              type: string
              description: 用于在日志中追踪该请求的唯一 ID（由请求头 X-Request-Id 或服务器生成）
            timestamp:
              type: string
              format: date-time
              description: 错误发生时间（ISO 8601）
    
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    # ========== 分类相关 ==========
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    CategoryWithEntryCount:
      type: object
      properties:
        name:
          type: string
        entry_count:
          type: integer
          description: 该分类下的知识条目数量
    
    CategoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CategoryWithEntryCount'
        total:
          type: integer
          description: 分类总数
    
    AdminCategoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            allOf:
              - $ref: '#/components/schemas/Category'
              - type: object
                properties:
                  entry_count:
                    type: integer
                    description: 该分类下的知识条目数量
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    
    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    
    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    
    CategoryStats:
      type: object
      properties:
        name:
          type: string
        total_entries:
          type: integer
          description: 该分类下的知识条目总数
        by_language:
          type: object
          additionalProperties:
            type: integer
          description: 按编程语言统计的条目数量
        avg_quality_score:
          type: number
          format: float
          description: 平均质量分数
    
    AdminCategoryStats:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        total_entries:
          type: integer
          description: 该分类下的知识条目总数
        by_language:
          type: object
          additionalProperties:
            type: integer
          description: 按编程语言统计的条目数量
        by_difficulty:
          type: object
          additionalProperties:
            type: integer
          description: 按难度等级(1-5)统计的条目数量
        by_framework:
          type: object
          additionalProperties:
            type: integer
          description: 按框架统计的条目数量
        avg_quality_score:
          type: number
          format: float
          description: 平均质量分数
        recent_entries:
          type: integer
          description: 最近7天新增的条目数量

    # ========== 认证相关 ==========
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
    
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: 过期时间（秒）
        requirePasswordChange:
          type: boolean
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            role:
              type: string
              enum: [user, admin, super_admin]
            email:
              type: string
            isSuperAdmin:
              type: boolean
              description: 是否为超级管理员
            permissions:
              type: array
              items:
                type: string
              description: 用户拥有的权限列表
    
    MfaRequiredResponse:
      type: object
      properties:
        mfaRequired:
          type: boolean
          example: true
        tempToken:
          type: string
    
    MfaLoginRequest:
      type: object
      required:
        - tempToken
        - mfaCode
      properties:
        tempToken:
          type: string
        mfaCode:
          type: string
          minLength: 6
          maxLength: 8
    
    AdminProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin, super_admin]
        isSuperAdmin:
          type: boolean
          description: 是否为超级管理员（通过角色标志位判断）
        permissions:
          type: array
          items:
            type: string
          description: 当前用户拥有的权限列表（super_admin 返回空数组，隐式拥有所有权限）
        mfaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
    
    UpdateProfileRequest:
      type: object
      properties:
        email:
          type: string
          format: email
    
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          description: 必须包含大小写字母、数字和特殊字符
    
    MfaSetupResponse:
      type: object
      properties:
        secret:
          type: string
        qrCodeUrl:
          type: string
        backupCodes:
          type: array
          items:
            type: string

    # ========== API Key相关 ==========
    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        permissions:
          type: array
          items:
            type: string
            enum: [read, write]
          default: [read, write]
          description: API Key 权限，仅支持 read 和 write
        rateLimit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
        expiresAt:
          type: string
          format: date-time
    
    UpdateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        permissions:
          type: array
          items:
            type: string
            enum: [read, write]
          description: API Key 权限，仅支持 read 和 write
        rateLimit:
          type: integer
          minimum: 1
          maximum: 1000
        expiresAt:
          type: string
          format: date-time
        isActive:
          type: boolean
    
    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: 完整API Key（仅在创建或重新生成时返回）
        keyPrefix:
          type: string
          description: Key前缀，用于识别
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        rateLimit:
          type: integer
        isActive:
          type: boolean
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: 创建该 API Key 的管理员用户 ID，用于审计日志的操作者归属
        lastUsedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    
    ApiKeyListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ApiKey'

    # ========== 知识条目相关 ==========
    CreateEntryRequest:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 50000
        summary:
          type: string
          maxLength: 1000
        category:
          type: string
          maxLength: 100
          description: 分类名称，必须是已存在的分类
        tags:
          type: array
          items:
            type: string
        language:
          type: string
          maxLength: 50
        framework:
          type: string
          maxLength: 100
        difficulty_level:
          type: integer
          minimum: 1
          maximum: 5
        structured_data:
          type: object
        visibility:
          type: string
          enum: [private, public]
          default: private
          description: 条目可见性。`private` 仅创建者所属 API Key 可读取；`public` 任意有效 API Key 可读取。默认 `private`。

    UpdateEntryRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 50000
        summary:
          type: string
          maxLength: 1000
        category:
          type: string
          maxLength: 100
        tags:
          type: array
          items:
            type: string
        language:
          type: string
          maxLength: 50
        framework:
          type: string
          maxLength: 100
        difficulty_level:
          type: integer
          minimum: 1
          maximum: 5
        structured_data:
          type: object
        change_summary:
          type: string
          description: 本次修改的摘要说明
        visibility:
          type: string
          enum: [private, public]
          description: 条目可见性。仅 owner 可修改。

    CreateEntryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entry_version:
          type: integer
        visibility:
          type: string
          enum: [private, public]
        embedding_status:
          type: string
          enum: [processing, completed, failed]
        created_at:
          type: string
          format: date-time
    
    KnowledgeEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        language:
          type: string
        framework:
          type: string
        difficultyLevel:
          type: integer
        qualityScore:
          type: number
        structuredData:
          type: object
        createdBy:
          type: string
          format: uuid
          description: 创建该条目的 API Key ID（UUID 格式，非用户名）
        visibility:
          type: string
          enum: [private, public]
          description: '`private` 仅创建者所属 API Key 可读取；`public` 任意有效 API Key 可读取'
        entryVersion:
          type: integer
        isLatest:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    KnowledgeListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/KnowledgeEntry'
    
    KnowledgeVersion:
      type: object
      properties:
        version:
          type: integer
        title:
          type: string
        content:
          type: string
        summary:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        language:
          type: string
        framework:
          type: string
        difficultyLevel:
          type: integer
        changeSummary:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
          description: 提交此版本的 API Key ID（UUID 格式）
    
    KnowledgeStats:
      type: object
      properties:
        total:
          type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
        avgQualityScore:
          type: number
    
    AdminKnowledgeListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  title:
                    type: string
                  category:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string
                  qualityScore:
                    type: number
                  createdAt:
                    type: string
                    format: date-time
                  createdBy:
                    type: string
                    format: uuid
                    description: 创建该条目的 API Key ID（UUID 格式，非用户名）
    
    AdminKnowledgeStats:
      type: object
      properties:
        total:
          type: integer
        byCategory:
          type: object
          additionalProperties:
            type: integer
        avgQualityScore:
          type: number

    # ========== 管理员用户相关 ==========
    AdminUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin, super_admin]
        isActive:
          type: boolean
        mfaEnabled:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
          format: uuid
          nullable: true
          description: 创建该用户的管理员用户 ID（创建者主权）
        createdAt:
          type: string
          format: date-time

    AdminUserListResponse:
      allOf:
        - $ref: '#/components/schemas/PaginationMeta'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AdminUserSummary'

    CreateAdminUserRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          description: 必须包含大小写字母、数字和特殊字符
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
          default: admin
          description: 可创建的角色。`super_admin` 只能通过数据库初始化或 CLI 产生，不可通过本 API 创建。

    UpdateAdminUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin, super_admin]
        isActive:
          type: boolean

    # ========== 角色相关 ==========
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        description:
          type: string
          nullable: true
        isSystem:
          type: boolean
          description: 是否为系统角色（不可删除）
        isSuperAdmin:
          type: boolean
          description: 是否为超级管理员角色（隐式拥有所有权限）
        permissions:
          type: array
          items:
            type: string
          description: 该角色拥有的权限列表
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRoleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 角色名称，必须唯一
        description:
          type: string
          maxLength: 500
        permissions:
          type: array
          items:
            type: string
            enum:
              - users:read
              - users:write
              - knowledge:read
              - knowledge:read_all
              - knowledge:delete
              - apikeys:read
              - apikeys:write
              - audit:read
              - analytics:read
              - system:read
              - stats:read
              - libraries:read
              - libraries:write
          description: 权限列表（roles:manage 仅 super_admin 通过标志位控制）

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 角色名称（系统角色不可修改名称）
        description:
          type: string
          maxLength: 500
        permissions:
          type: array
          items:
            type: string
            enum:
              - users:read
              - users:write
              - knowledge:read
              - knowledge:read_all
              - knowledge:delete
              - apikeys:read
              - apikeys:write
              - audit:read
              - analytics:read
              - system:read
              - stats:read
              - libraries:read
              - libraries:write

    # ========== 审计日志相关 ==========
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        # 4W1H1R 字段
        actorType:
          type: string
          enum: [admin_user, api_key, system]
          description: '操作者类型 (Who)'
        actorId:
          type: string
          format: uuid
          nullable: true
          description: 操作者ID，admin_user.id 或 api_key.id (Who)
        actorName:
          type: string
          nullable: true
          description: 操作者名称，用户名或 API Key 名称 (Who)
        actorRole:
          type: string
          nullable: true
          enum: [user, admin, super_admin]
          description: 管理员角色 (Who)
        source:
          type: string
          enum: [admin_panel, public_api, mcp, system]
          description: 操作来源 (How)
        clientInfo:
          type: object
          nullable: true
          description: '客户端结构化信息，MCP 调用时包含 mcpClient、clientVersion 等 (How)'
          properties:
            mcpClient:
              type: string
              description: MCP 客户端名称，如 cursor、claude-desktop、windsurf
            clientVersion:
              type: string
              description: 客户端版本号
            apiKeyId:
              type: string
              description: API Key ID（当 API Key 有 owner 时，actor 为 owner，此处保留 key 信息）
            apiKeyName:
              type: string
            requestId:
              type: string
              description: 请求关联 ID
        action:
          type: string
          description: '操作动作，如 admin.login、entry.create、mcp.search_knowledge (What)'
        resourceType:
          type: string
          nullable: true
          description: '资源类型，如 admin_user、knowledge、apikey、category (What)'
        resourceId:
          type: string
          format: uuid
          nullable: true
          description: 资源 ID (What)
        details:
          type: object
          nullable: true
          description: 操作详情 (What)
        ipAddress:
          type: string
          nullable: true
          description: '客户端 IP 地址 (Where)'
        userAgent:
          type: string
          nullable: true
          description: '客户端 User-Agent (How)'
        httpStatusCode:
          type: integer
          nullable: true
          description: 'HTTP 状态码 (Result)，由中间件在响应完成后自动补写'
        status:
          type: string
          enum: [success, failure, error]
          nullable: true
          description: '操作结果状态 (Result)：success=正常完成，failure=预期拒绝（密码错误、token 过期、权限不足），error=非预期系统异常'
        errorMessage:
          type: string
          nullable: true
          description: '错误信息 (Result)'
        createdAt:
          type: string
          format: date-time
