  # ==================== 管理员自助服务 ====================
  /admin/me/api-keys:
    get:
      tags:
        - Admin Self-Service
      summary: 获取自己的 API Key 列表
      description: |
        普通用户自助服务接口。返回当前登录用户自己创建的 API Key 列表。
      security:
        - AdminAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      tags:
        - Admin Self-Service
      summary: 创建自己的 API Key
      description: |
        普通用户自助服务接口。新创建的 Key 的 `owner_id` 自动绑定为当前调用者。
        当前用户为 user 角色时，即便请求 `admin` 权限也会被服务端剥离为 `["read"]`。
      security:
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/me/api-keys/{id}:
    get:
      tags:
        - Admin Self-Service
      summary: 获取自己的 API Key 详情
      description: |
        普通用户自助服务接口。只能查看自己名下的 Key；非 owner 调用返回 404。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      tags:
        - Admin Self-Service
      summary: 更新自己的 API Key
      description: |
        普通用户自助服务接口。只能修改自己名下的 Key，且不得修改 `isActive` 字段。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApiKeyRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Admin Self-Service
      summary: 删除自己的 API Key
      description: |
        普通用户自助服务接口。只能删除自己名下的 Key。关联的 audit_logs / request_logs 行的 api_key_id 将被置为 NULL（ON DELETE SET NULL），不会级联删除日志。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '204':
          description: 删除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/me/api-keys/{id}/regenerate:
    post:
      tags:
        - Admin Self-Service
      summary: 重新生成自己的 API Key
      description: |
        普通用户自助服务接口。废弃旧 Key 并生成新 Key，只能重新生成自己名下的 Key。返回完整的 ApiKey 对象，包含新生成的明文 key。
      security:
        - AdminAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 重新生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/me/stats:
    get:
      tags:
        - Admin Self-Service
      summary: 获取自己的统计 Dashboard
      description: |
        普通用户自助服务接口。返回当前用户自己名下 API Key 的请求统计与汇总数据。
      security:
        - AdminAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKeys:
                    type: object
                    properties:
                      total:
                        type: integer
                      active:
                        type: integer
                  requests:
                    type: object
                    properties:
                      today:
                        type: integer
                      thisWeek:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

