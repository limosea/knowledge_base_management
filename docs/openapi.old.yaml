          description: 删除成功
        '400':
          description: 有用户仍使用该角色
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== 审计日志 ====================
  /admin/audit-logs:
    get:
      tags:
        - Admin Audit Logs
      summary: 查询审计日志
      description: |
        需要 admin 或 super_admin 权限。
      security:
        - AdminAuth: []
      parameters:
        - name: action
          in: query
          description: 按操作动作过滤
          schema:
            type: string
        - name: resourceType
          in: query
          description: 按资源类型过滤
          schema:
            type: string
        - name: actorType
          in: query
          description: 按操作者类型过滤
          schema:
            type: string
            enum: [admin_user, api_key, system]
        - name: actorName
          in: query
          description: 按操作者名称模糊搜索
          schema:
            type: string
        - name: source
          in: query
          description: 按操作来源过滤
          schema:
            type: string
            enum: [admin_panel, public_api, mcp, system]
        - name: status
          in: query
          description: 按操作结果状态过滤
          schema:
            type: string
            enum: [success, failure, error]
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/audit-logs/export:
    get:
      tags:
        - Admin Audit Logs
      summary: 导出审计日志
      description: |
        需要 admin 或 super_admin 权限。以 NDJSON（每行一个 JSON 对象）流式下载匹配的审计日志。响应通过
        `Transfer-Encoding: chunked` 逐批写出，内存占用恒定，不会因日志量过大
        导致 OOM，也没有条目上限截断。

        建议客户端按行解析。`Content-Disposition` 头会提示文件名
        `audit-logs.ndjson`。
      security:
        - AdminAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: action
          in: query
          schema:
            type: string
        - name: resourceType
          in: query
          schema:
            type: string
        - name: actorType
          in: query
          description: 按操作者类型过滤
          schema:
            type: string
            enum: [admin_user, api_key, system]
        - name: source
          in: query
          description: 按操作来源过滤
          schema:
            type: string
            enum: [admin_panel, public_api, mcp, system]
        - name: status
          in: query
          description: 按操作结果状态过滤
          schema:
            type: string
            enum: [success, failure, error]
      responses:
        '200':
          description: NDJSON 流（每行一个 AuditLog 对象）
          content:
            application/x-ndjson:
              schema:
                type: string
                description: |
                  多行 NDJSON，每行为一个完整的 AuditLog JSON 对象。
                  示例首行：
                  ```
                  {"id":"...","action":"LOGIN","createdAt":"..."}
                  ```
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/audit-logs/{id}:
    get:
      tags:
        - Admin Audit Logs
      summary: 获取审计日志详情
      description: |
        需要 admin 或 super_admin 权限。
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'

