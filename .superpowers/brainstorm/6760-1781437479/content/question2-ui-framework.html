<h2>UI组件库偏好？</h2>
<p class="subtitle">这将影响开发效率和界面风格</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Ant Design</h3>
      <p>企业级UI，功能完善，适合后台管理系统，中文文档友好</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Shadcn/ui + Tailwind CSS</h3>
      <p>现代化设计，高度可定制，体积小，但需要更多样式工作</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Material-UI (MUI)</h3>
      <p>Google Material Design，组件丰富，国际化支持好</p>
    </div>
  </div>
</div>
