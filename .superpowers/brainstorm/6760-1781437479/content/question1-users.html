<h2>谁是主要使用者？</h2>
<p class="subtitle">了解用户画像有助于我们设计更合适的界面</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>技术团队</h3>
      <p>开发人员、技术文档作者，习惯使用技术工具</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>业务团队</h3>
      <p>产品经理、运营人员，需要简单易用的界面</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合团队</h3>
      <p>技术和业务人员都会使用，需要平衡易用性和功能性</p>
    </div>
  </div>
</div>
