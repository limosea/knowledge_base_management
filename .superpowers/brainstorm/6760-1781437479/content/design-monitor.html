<h2>系统监控页面</h2>
<p class="subtitle">统计数据与健康状态</p>

<div class="mockup">
  <div class="mockup-header">仪表盘布局</div>
  <div class="mockup-body">
    <div style="background:white;border-radius:8px;padding:20px;">
      <div style="font-size:18px;font-weight:600;margin-bottom:20px;">系统概览</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
        <div style="background:#eff6ff;padding:16px;border-radius:8px;">
          <div style="font-size:13px;color:#6b7280;margin-bottom:4px;">知识条目总数</div>
          <div style="font-size:28px;font-weight:600;color:#1e40af;">1,234</div>
          <div style="font-size:12px;color:#10b981;margin-top:4px;">↑ 12% 本周</div>
        </div>
        <div style="background:#f0fdf4;padding:16px;border-radius:8px;">
          <div style="font-size:13px;color:#6b7280;margin-bottom:4px;">活跃 API Key</div>
          <div style="font-size:28px;font-weight:600;color:#166534;">8</div>
          <div style="font-size:12px;color:#6b7280;margin-top:4px;">共 10 个</div>
        </div>
        <div style="background:#fefce8;padding:16px;border-radius:8px;">
          <div style="font-size:13px;color:#6b7280;margin-bottom:4px;">今日请求</div>
          <div style="font-size:28px;font-weight:600;color:#854d0e;">5,678</div>
          <div style="font-size:12px;color:#10b981;margin-top:4px;">↑ 8% 昨日</div>
        </div>
        <div style="background:#fef2f2;padding:16px;border-radius:8px;">
          <div style="font-size:13px;color:#6b7280;margin-bottom:4px;">平均质量分</div>
          <div style="font-size:28px;font-weight:600;color:#991b1b;">4.5</div>
          <div style="font-size:12px;color:#6b7280;margin-top:4px;">满分 5.0</div>
        </div>
      </div>
      
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;">
        <div style="border:1px solid #e5e7eb;border-radius:8px;padding:16px;">
          <div style="font-weight:600;margin-bottom:12px;">知识条目分类分布</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:60%;height:20px;background:#3b82f6;border-radius:4px;"></div>
              <div style="font-size:13px;">前端 (456)</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:40%;height:20px;background:#10b981;border-radius:4px;"></div>
              <div style="font-size:13px;">后端 (312)</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:25%;height:20px;background:#f59e0b;border-radius:4px;"></div>
              <div style="font-size:13px;">DevOps (198)</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:18%;height:20px;background:#8b5cf6;border-radius:4px;"></div>
              <div style="font-size:13px;">其他 (142)</div>
            </div>
          </div>
        </div>
        <div style="border:1px solid #e5e7eb;border-radius:8px;padding:16px;">
          <div style="font-weight:600;margin-bottom:12px;">系统健康状态</div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span>数据库</span>
              <span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:4px;font-size:12px;">正常</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span>API 服务</span>
              <span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:4px;font-size:12px;">正常</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span>响应延迟</span>
              <span style="color:#6b7280;font-size:13px;">23ms</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
