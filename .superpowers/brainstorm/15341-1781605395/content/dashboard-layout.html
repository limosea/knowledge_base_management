<h2>Dashboard页面布局</h2>
<p class="subtitle">4个KPI模块应该如何布局？</p>

<div class="options">
  <div class="option" data-choice="layout-2x2" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>2x2网格布局</h3>
      <div class="mockup" style="margin-top:12px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="placeholder" style="padding:24px;text-align:center;">知识条目总数<br><span style="font-size:28px;font-weight:700;">2,456</span></div>
          <div class="placeholder" style="padding:24px;text-align:center;">请求统计趋势<br><span style="font-size:12px;color:#666;">📊 折线图</span></div>
          <div class="placeholder" style="padding:24px;text-align:center;">最近操作记录<br><span style="font-size:12px;color:#666;">📝 列表</span></div>
          <div class="placeholder" style="padding:24px;text-align:center;">系统健康状态<br><span style="font-size:12px;color:#666;">💚 状态卡片</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="layout-top-bottom" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>上下分栏布局</h3>
      <div class="mockup" style="margin-top:12px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
          <div class="placeholder" style="padding:24px;text-align:center;">知识条目总数<br><span style="font-size:28px;font-weight:700;">2,456</span></div>
          <div class="placeholder" style="padding:24px;text-align:center;">系统健康状态<br><span style="font-size:12px;color:#666;">💚 正常</span></div>
        </div>
        <div class="placeholder" style="padding:24px;text-align:center;height:200px;">请求统计趋势（横向折线图）</div>
        <div class="placeholder" style="padding:24px;margin-top:12px;">最近操作记录（列表）</div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="layout-cards-row" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>卡片行+内容区</h3>
      <div class="mockup" style="margin-top:12px;">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;">
          <div class="placeholder" style="padding:16px;text-align:center;">知识条目<br><span style="font-size:20px;font-weight:700;">2,456</span></div>
          <div class="placeholder" style="padding:16px;text-align:center;">今日请求<br><span style="font-size:20px;font-weight:700;">1,234</span></div>
          <div class="placeholder" style="padding:16px;text-align:center;">活跃API<br><span style="font-size:20px;font-weight:700;">12</span></div>
          <div class="placeholder" style="padding:16px;text-align:center;">系统状态<br><span style="font-size:20px;">💚</span></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="placeholder" style="padding:24px;height:200px;">请求趋势图</div>
          <div class="placeholder" style="padding:24px;height:200px;">最近操作记录</div>
        </div>
      </div>
    </div>
  </div>
</div>

<p style="margin-top:20px;color:#888;font-size:14px;">💡 推荐方案C，顶部小卡片快速概览，下方详细内容</p>
